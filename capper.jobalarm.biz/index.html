function normName(n) { return (n||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }

function computeTrackSummary(t) {
  const results = State.results[rKey(t)];
  if (!results) return null;
  const trackIdx = State.tracks.indexOf(t);
  if (trackIdx < 0) return null;
  const raceNums = Object.keys(results.races || {}).map(Number).sort((a,b)=>a-b);

  // Temporarily switch active track + jockey profiles so rankedHorses() scores with the correct context
  const savedActive = State.activeTrack;
  const savedProfiles = State.jockeyProfiles;
  State.activeTrack = trackIdx;
  State.jockeyProfiles = buildJockeyProfiles();

  const liveTop3ForRace = rn => {
    const race = t.races.find(r => r.number === rn);
    if (!race) return [];
    return rankedHorses(race).slice(0,3).map(h => normName(h.name));
  };

  let wins=0, exactas=0, trifectas=0, totalRaces=0, winReturn=0, winInvest=0;
  for (const rn of raceNums) {
    const rr = results.races[rn];
    if (!rr?.finishers?.length) continue;
    const race = t.races.find(r => r.number === rn);
    if (!race) continue;
    const ranked = rankedHorses(race);
    if (!ranked.length) continue;
    const m3 = ranked.slice(0,3).map(h => normName(h.name));
    const f = rr.finishers;
    totalRaces++;
    winInvest += 2;
    const w1hit = f[0] && normName(f[0].name) === normName(ranked[0].name);
    if (w1hit) { wins++; winReturn += f[0].win || 0; }
    if (f[0]&&f[1] && m3.includes(normName(f[0].name)) && m3.includes(normName(f[1].name))) exactas++;
    if (f[0]&&f[1]&&f[2] && [f[0],f[1],f[2]].every(x=>m3.includes(normName(x.name)))) trifectas++;
  }

  let p3Budget = 0, p3Return = 0, p3Hits = 0, p3Tickets = 0;
  for (let i = 2; i < raceNums.length; i++) {
    const [r1, r2, r3] = [raceNums[i-2], raceNums[i-1], raceNums[i]];
    const rr1 = results.races[r1], rr2 = results.races[r2], rr3 = results.races[r3];
    if (!rr1?.finishers?.length || !rr2?.finishers?.length || !rr3?.finishers?.length) continue;
    if (!rr3.exotics?.['Pick 3']) continue;
    p3Tickets++;
    p3Budget += 27;
    if (liveTop3ForRace(r1).includes(normName(rr1.finishers[0].name)) &&
        liveTop3ForRace(r2).includes(normName(rr2.finishers[0].name)) &&
        liveTop3ForRace(r3).includes(normName(rr3.finishers[0].name))) {
      p3Hits++;
      const p3data = rr3.exotics['Pick 3'];
      if (p3data?.payout) p3Return += p3data.payout / (rr3.payoutBase ?? 2);
    }
  }

  // Pick 4: $81/ticket (3^4 × $1), 4 consecutive races
  let p4Budget = 0, p4Return = 0, p4Hits = 0;
  for (let i = 3; i < raceNums.length; i++) {
    const [r1, r2, r3, r4] = [raceNums[i-3], raceNums[i-2], raceNums[i-1], raceNums[i]];
    const rr1 = results.races[r1], rr2 = results.races[r2], rr3 = results.races[r3], rr4 = results.races[r4];
    if (!rr1?.finishers?.length || !rr2?.finishers?.length || !rr3?.finishers?.length || !rr4?.finishers?.length) continue;
    if (!rr4.exotics?.['Pick 4']) continue;
    p4Budget += 81;
    if (liveTop3ForRace(r1).includes(normName(rr1.finishers[0].name)) &&
        liveTop3ForRace(r2).includes(normName(rr2.finishers[0].name)) &&
        liveTop3ForRace(r3).includes(normName(rr3.finishers[0].name)) &&
        liveTop3ForRace(r4).includes(normName(rr4.finishers[0].name))) {
      p4Hits++;
      const p4data = rr4.exotics['Pick 4'];
      if (p4data?.payout) p4Return += p4data.payout / (rr4.payoutBase ?? 2);
    }
  }

  // WPS: $2 Win + $2 Place + $2 Show on top pick per race
  let wpsInvest = 0, wpsReturn = 0;
  for (const rn of raceNums) {
    const rr = results.races[rn];
    if (!rr?.finishers?.length) continue;
    const race = t.races.find(r => r.number === rn);
    if (!race) continue;
    const ranked = rankedHorses(race);
    if (!ranked.length) continue;
    const topName = normName(ranked[0].name);
    const f = rr.finishers;
    wpsInvest += 6;
    const pos = f.findIndex(h => normName(h.name) === topName);
    if (pos === 0) wpsReturn += (f[0].win || 0);
    if (pos >= 0 && pos <= 1) wpsReturn += (f[pos].place || 0);
    if (pos >= 0 && pos <= 2) wpsReturn += (f[pos].show || 0);
  }

  // Exacta Box 2: $2/race (2 perms × $1), top 2 picks in 1st/2nd any order
  let ex2Invest = 0, ex2Return = 0, ex2Hits = 0;
  for (const rn of raceNums) {
    const rr = results.races[rn];
    if (!rr?.finishers?.length || !rr.exotics?.['Exacta']) continue;
    const race = t.races.find(r => r.number === rn);
    if (!race) continue;
    const ranked = rankedHorses(race);
    if (ranked.length < 2 || rr.finishers.length < 2) continue;
    const top2 = ranked.slice(0,2).map(h => normName(h.name));
    ex2Invest += 2;
    if (top2.includes(normName(rr.finishers[0].name)) && top2.includes(normName(rr.finishers[1].name))) {
      ex2Hits++;
      ex2Return += (rr.exotics['Exacta'].payout || 0) / (rr.payoutBase ?? 2);
    }
  }

  // Exacta Box 3: $6/race (6 perms × $1), top 3 picks, any 2 in 1st/2nd
  let ex3Invest = 0, ex3Return = 0, ex3Hits = 0;
  for (const rn of raceNums) {
    const rr = results.races[rn];
    if (!rr?.finishers?.length || !rr.exotics?.['Exacta']) continue;
    const race = t.races.find(r => r.number === rn);
    if (!race) continue;
    const ranked = rankedHorses(race);
    if (ranked.length < 3 || rr.finishers.length < 2) continue;
    const top3 = ranked.slice(0,3).map(h => normName(h.name));
    ex3Invest += 6;
    if (top3.includes(normName(rr.finishers[0].name)) && top3.includes(normName(rr.finishers[1].name))) {
      ex3Hits++;
      ex3Return += (rr.exotics['Exacta'].payout || 0) / (rr.payoutBase ?? 2);
    }
  }

  // Trifecta Box 3: $6/race (6 perms × $1), top 3 in 1st/2nd/3rd any order
  let trifInvest = 0, trifReturn = 0, trifHits = 0;
  for (const rn of raceNums) {
    const rr = results.races[rn];
    if (!rr?.finishers?.length || !rr.exotics?.['Trifecta']) continue;
    const race = t.races.find(r => r.number === rn);
    if (!race) continue;
    const ranked = rankedHorses(race);
    if (ranked.length < 3 || rr.finishers.length < 3) continue;
    const top3 = ranked.slice(0,3).map(h => normName(h.name));
    trifInvest += 6;
    if ([rr.finishers[0],rr.finishers[1],rr.finishers[2]].every(h => top3.includes(normName(h.name)))) {
      trifHits++;
      trifReturn += (rr.exotics['Trifecta'].payout || 0) / (rr.payoutBase ?? 2);
    }
  }

  // Superfecta Box 4: $24/race (24 perms × $1), top 4 in 1st-4th any order
  let sfInvest = 0, sfReturn = 0, sfHits = 0;
  for (const rn of raceNums) {
    const rr = results.races[rn];
    if (!rr?.finishers?.length || !rr.exotics?.['Superfecta']) continue;
    const race = t.races.find(r => r.number === rn);
    if (!race) continue;
    const ranked = rankedHorses(race);
    if (ranked.length < 4 || rr.finishers.length < 4) continue;
    const top4 = ranked.slice(0,4).map(h => normName(h.name));
    sfInvest += 24;
    if ([rr.finishers[0],rr.finishers[1],rr.finishers[2],rr.finishers[3]].every(h => top4.includes(normName(h.name)))) {
      sfHits++;
      sfReturn += (rr.exotics['Superfecta'].payout || 0) / (rr.payoutBase ?? 2);
    }
  }

  State.activeTrack = savedActive;
  State.jockeyProfiles = savedProfiles;

  const winNet = winReturn - winInvest;
  const winRoi = winInvest > 0 ? (winNet / winInvest * 100) : null;
  const p3Net = p3Return - p3Budget;
  const p3Roi = p3Budget > 0 ? (p3Net / p3Budget * 100) : null;
  const p4Net = p4Return - p4Budget;
  const p4Roi = p4Budget > 0 ? (p4Net / p4Budget * 100) : null;
  const wpsNet = wpsReturn - wpsInvest;
  const wpsRoi = wpsInvest > 0 ? (wpsNet / wpsInvest * 100) : null;
  const ex2Net = ex2Return - ex2Invest;
  const ex2Roi = ex2Invest > 0 ? (ex2Net / ex2Invest * 100) : null;
  const ex3Net = ex3Return - ex3Invest;
  const ex3Roi = ex3Invest > 0 ? (ex3Net / ex3Invest * 100) : null;
  const trifNet = trifReturn - trifInvest;
  const trifRoi = trifInvest > 0 ? (trifNet / trifInvest * 100) : null;
  const sfNet = sfReturn - sfInvest;
  const sfRoi = sfInvest > 0 ? (sfNet / sfInvest * 100) : null;
  const totalNet = winNet + (p3Budget > 0 ? p3Net : 0);
  const totalBudget = winInvest + p3Budget;
  const totalRoi = totalBudget > 0 ? (totalNet / totalBudget * 100) : null;
  return { wins, totalRaces, winReturn, winInvest, winNet, winRoi, exactas, trifectas,
           p3Net, p3Return, p3Budget, p3Hits, p3Tickets, p3Roi,
           p4Net, p4Return, p4Budget, p4Hits, p4Roi,
           wpsNet, wpsReturn, wpsInvest, wpsRoi,
           ex2Net, ex2Return, ex2Invest, ex2Hits, ex2Roi,
           ex3Net, ex3Return, ex3Invest, ex3Hits, ex3Roi,
           trifNet, trifReturn, trifInvest, trifHits, trifRoi,
           sfNet, sfReturn, sfInvest, sfHits, sfRoi,
           totalNet, totalBudget, totalRoi };
}

function computeAllTimeSummary(db, betType) {
  betType = betType || 'pick3';
  let totalNet = 0, totalBudget = 0;
  const nn = normName;
  const getRanked = rr => [...(rr?.predictions || [])].sort((a,b) => b.score - a.score);
  const topN = (rr, n) => getRanked(rr).slice(0, n).map(p => nn(p.name));

  for (const key of Object.keys(db)) {
    const entry = db[key];
    const raceNums = Object.keys(entry.races || {}).map(Number).sort((a,b)=>a-b);
    let eNet = 0, eBudget = 0;

    if (betType === 'pick3') {
      for (let i = 2; i < raceNums.length; i++) {
        const [r1,r2,r3] = [raceNums[i-2],raceNums[i-1],raceNums[i]];
        const rr1=entry.races[r1], rr2=entry.races[r2], rr3=entry.races[r3];
        if (!rr1?.finishers?.length||!rr2?.finishers?.length||!rr3?.finishers?.length) continue;
        if (!rr3.exotics?.['Pick 3']) continue;
        eBudget+=27; eNet-=27;
        if (topN(rr1,3).includes(nn(rr1.finishers[0].name)) &&
            topN(rr2,3).includes(nn(rr2.finishers[0].name)) &&
            topN(rr3,3).includes(nn(rr3.finishers[0].name))) {
          const p=rr3.exotics['Pick 3']; if (p?.payout) eNet+=p.payout/(rr3.payoutBase??2);
        }
      }
    } else if (betType === 'pick4') {
      for (let i = 3; i < raceNums.length; i++) {
        const [r1,r2,r3,r4]=[raceNums[i-3],raceNums[i-2],raceNums[i-1],raceNums[i]];
        const rr1=entry.races[r1],rr2=entry.races[r2],rr3=entry.races[r3],rr4=entry.races[r4];
        if (!rr1?.finishers?.length||!rr2?.finishers?.length||!rr3?.finishers?.length||!rr4?.finishers?.length) continue;
        if (!rr4.exotics?.['Pick 4']) continue;
        eBudget+=81; eNet-=81;
        if (topN(rr1,3).includes(nn(rr1.finishers[0].name)) &&
            topN(rr2,3).includes(nn(rr2.finishers[0].name)) &&
            topN(rr3,3).includes(nn(rr3.finishers[0].name)) &&
            topN(rr4,3).includes(nn(rr4.finishers[0].name))) {
          const p=rr4.exotics['Pick 4']; if (p?.payout) eNet+=p.payout/(rr4.payoutBase??2);
        }
      }
    } else if (betType === 'wps') {
      for (const rn of raceNums) {
        const rr=entry.races[rn];
        if (!rr?.finishers?.length||!rr.predictions?.length) continue;
        const top1=getRanked(rr)[0]; if (!top1) continue;
        const topName=nn(top1.name), f=rr.finishers;
        eBudget+=6; eNet-=6;
        const pos=f.findIndex(h=>nn(h.name)===topName);
        if (pos===0) eNet+=(f[0].win||0);
        if (pos>=0&&pos<=1) eNet+=(f[pos].place||0);
        if (pos>=0&&pos<=2) eNet+=(f[pos].show||0);
      }
    } else if (betType === 'exacta2') {
      for (const rn of raceNums) {
        const rr=entry.races[rn];
        if (!rr?.finishers?.length||!rr.exotics?.['Exacta']||!rr.predictions?.length) continue;
        const top2=topN(rr,2); if (top2.length<2||rr.finishers.length<2) continue;
        eBudget+=2; eNet-=2;
        if (top2.includes(nn(rr.finishers[0].name))&&top2.includes(nn(rr.finishers[1].name)))
          eNet+=(rr.exotics['Exacta'].payout||0)/(rr.payoutBase??2);
      }
    } else if (betType === 'exacta3') {
      for (const rn of raceNums) {
        const rr=entry.races[rn];
        if (!rr?.finishers?.length||!rr.exotics?.['Exacta']||!rr.predictions?.length) continue;
        const top3=topN(rr,3); if (top3.length<3||rr.finishers.length<2) continue;
        eBudget+=6; eNet-=6;
        if (top3.includes(nn(rr.finishers[0].name))&&top3.includes(nn(rr.finishers[1].name)))
          eNet+=(rr.exotics['Exacta'].payout||0)/(rr.payoutBase??2);
      }
    } else if (betType === 'trifecta3') {
      for (const rn of raceNums) {
        const rr=entry.races[rn];
        if (!rr?.finishers?.length||!rr.exotics?.['Trifecta']||!rr.predictions?.length) continue;
        const top3=topN(rr,3); if (top3.length<3||rr.finishers.length<3) continue;
        eBudget+=6; eNet-=6;
        if ([rr.finishers[0],rr.finishers[1],rr.finishers[2]].every(h=>top3.includes(nn(h.name))))
          eNet+=(rr.exotics['Trifecta'].payout||0)/(rr.payoutBase??2);
      }
    } else if (betType === 'super4') {
      for (const rn of raceNums) {
        const rr=entry.races[rn];
        if (!rr?.finishers?.length||!rr.exotics?.['Superfecta']||!rr.predictions?.length) continue;
        const top4=topN(rr,4); if (top4.length<4||rr.finishers.length<4) continue;
        eBudget+=24; eNet-=24;
        if ([rr.finishers[0],rr.finishers[1],rr.finishers[2],rr.finishers[3]].every(h=>top4.includes(nn(h.name))))
          eNet+=(rr.exotics['Superfecta'].payout||0)/(rr.payoutBase??2);
      }
    }

    totalNet+=eNet; totalBudget+=eBudget;
  }
  const totalRoi = totalBudget > 0 ? (totalNet / totalBudget * 100) : null;
  return { totalNet, totalBudget, totalRoi };
}

async function recalcAllPredictions(btn) {
  if (btn) { btn.disabled = true; btn.textContent = '⟳ …'; }
  // Check if index.html has changed — if so, reload before scoring
  try {
    const { mtime } = await fetch('/api/version').then(r => r.json());
    if (_appVersion && mtime !== _appVersion) {
      location.reload(true);
      return;
    }
  } catch {};
  const savedTracks   = State.tracks;
  const savedActive   = State.activeTrack;
  const savedResults  = { ...State.results };
  const savedProfiles = State.jockeyProfiles;

  for (const dateYMD of State.availableDates) {
    try {
      const res = await fetch(`/api/races?date=${dateYMD}`);
      const tracks = await res.json();
      if (!Array.isArray(tracks) || !tracks.length) continue;
      State.tracks = tracks;
      for (let idx = 0; idx < tracks.length; idx++) {
        const t = tracks[idx];
        try {
          const rRes = await fetch(`/api/results?trackCode=${t.trackCode}&date=${t.dateRaw}`);
          const results = await rRes.json();
          if (results.error) continue;
          State.activeTrack   = idx;
          State.results       = { [rKey(t)]: results };
          State.jockeyProfiles = buildJockeyProfiles();
          applyResultScratches(results, t);
          await savePredictions(t);
        } catch {}
      }
    } catch {}
  }

  State.tracks        = savedTracks;
  State.activeTrack   = savedActive;
  State.results       = savedResults;
  State.jockeyProfiles = savedProfiles;
  State.allTimeDb = null;
  State.allDaysData    = null;
  // Small delay to ensure all server writes have flushed before re-fetching
  await new Promise(r => setTimeout(r, 300));
  await fetchAllTimeSummary();
  render();
  if (btn) { btn.disabled = false; btn.textContent = '⟳ Recalc'; }
}

async function fetchAllTimeSummary() {
  try {
    const resp = await fetch('/api/results/all?t=' + Date.now());
    State.allTimeDb = await resp.json();
    renderResultsOverviewBar();
  } catch {}
}

function getBetStats(s) {
  if (!s) return null;
  const bt = AlgoState.betType || 'pick3';
  switch (bt) {
    case 'wps':     return { net: s.wpsNet,  roi: s.wpsRoi,  budget: s.wpsInvest, hits: null,       label: 'WPS' };
    case 'exacta2': return { net: s.ex2Net,  roi: s.ex2Roi,  budget: s.ex2Invest, hits: s.ex2Hits,  label: 'Exacta Box 2' };
    case 'exacta3': return { net: s.ex3Net,  roi: s.ex3Roi,  budget: s.ex3Invest, hits: s.ex3Hits,  label: 'Exacta Box 3' };
    case 'trifBox': return { net: s.trifNet, roi: s.trifRoi, budget: s.trifInvest,hits: s.trifHits, label: 'Trifecta Box' };
    case 'sfBox':   return { net: s.sfNet,   roi: s.sfRoi,   budget: s.sfInvest,  hits: s.sfHits,   label: 'Super Box' };
    case 'pick4':   return { net: s.p4Net,   roi: s.p4Roi,   budget: s.p4Budget,  hits: s.p4Hits,   label: 'Pick 4' };
    default:        return { net: s.p3Net,   roi: s.p3Roi,   budget: s.p3Budget,  hits: s.p3Hits,   label: 'Pick 3' };
  }
}

function renderResultsOverviewBar() {
  const el = document.getElementById('results-overview-bar');
  const fmtNet = n => (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);
  const fmtRoi = r => r !== null ? (r >= 0 ? '+' : '') + r.toFixed(0) + '%' : '—';
  const nc = n => n >= 0 ? 'var(--green)' : 'var(--red)';

  // Today: sum across all loaded tracks using active bet type
  let dayNet=0, dayBudget=0, dayRaces=0;
  for (const t of State.tracks) {
    const s = computeTrackSummary(t);
    if (!s || s.totalRaces === 0) continue;
    const bs = getBetStats(s);
    if (bs && bs.budget > 0) { dayNet += bs.net; dayBudget += bs.budget; }
    dayRaces  += s.totalRaces;
  }
  const dayRoi = dayBudget > 0 ? (dayNet / dayBudget * 100) : null;
  const hasDay = dayRaces > 0;

  const at = State.allTimeDb ? computeAllTimeSummary(State.allTimeDb, AlgoState.betType) : null;
  const hasAllTime = at && at.totalBudget > 0;

  if (!hasDay && !hasAllTime) { el.style.display = 'none'; return; }
  el.style.display = 'flex';

  const betLabels = { pick3:'Pick 3', wps:'WPS', exacta2:'Exacta 2', exacta3:'Exacta 3', trifecta3:'Trifecta 3', super4:'Superfecta 4', pick4:'Pick 4' };
  const betLabel = betLabels[AlgoState.betType || 'pick3'] || 'Pick 3';
  const dayHtml = hasDay ? `
    <span class="rob-label">Today <span style="font-weight:400;opacity:0.65">(${betLabel})</span></span>
    <span class="rob-val" style="color:${nc(dayNet)}">${fmtNet(dayNet)}</span>
    <span class="rob-val" style="color:${nc(dayRoi??0)}">${fmtRoi(dayRoi)}</span>
  ` : '';

  const atHtml = hasAllTime ? `
    <span class="rob-label">All Time <span style="font-weight:400;opacity:0.65">(${betLabel})</span></span>
    <span class="rob-val" style="color:${nc(at.totalNet)}">${fmtNet(at.totalNet)}</span>
    <span class="rob-val" style="color:${nc(at.totalRoi??0)}">${fmtRoi(at.totalRoi)}</span>
  ` : '';

  el.innerHTML = dayHtml
    + (hasDay && hasAllTime ? '<div class="rob-divider"></div>' : '')
    + atHtml
    + `<div class="rob-divider"></div>
      <span class="rob-label">Algorithm</span>
      <div class="algo-selector" id="algo-selector">
        <button class="algo-selector-btn" onclick="toggleAlgoDropdown(event)" title="Switch or manage algos">
          <span class="algo-name" id="algo-selector-name">Base Algo</span>
          <span class="algo-caret">▾</span>
        </button>
        <div class="algo-dropdown" id="algo-dropdown" style="display:none"></div>
      </div>`;
  renderAlgoSelector();
}

function getResultBadge(raceNum, horseName) {
  const rr = currentResults()?.races?.[raceNum];
  if (!rr) return '';
  const pos = (rr.finishers || []).findIndex(f => normName(f.name) === normName(horseName));
  if (pos < 0 || pos > 3) return '';
  const labels = ['1ST','2ND','3RD','4TH'];
  const cls    = ['rb-1','rb-2','rb-3','rb-4'];
  return `<span class="result-badge ${cls[pos]}">${labels[pos]}</span>`;
}

function renderResultsView(el) {
  if (State.showAllDays) { renderAllDaysView(el); return; }

  const cr = currentResults();
  if (!cr) {
    el.innerHTML = `<div class="results-no-data">
      <div>No results loaded for this race card.</div>
      <button class="results-fetch-btn" onclick="loadResults()">Fetch Results from HRN</button>
      <div style="margin-top:1rem"><button class="alldays-btn" onclick="State.showAllDays=true;renderResultsView(document.getElementById('bet-area'))">All Days →</button></div>
    </div>`;
    return;
  }

  const t = currentTrack();
  const allRaceNums = Object.keys(cr.races || {}).map(Number).sort((a,b)=>a-b);
  const raceResults = cr.races?.[State.activeRace];

  // ── Day summary across all races ────────────────────────────
  // Rebuild jockey profiles to match computeTrackSummary scoring context
  const savedProfilesRV = State.jockeyProfiles;
  State.jockeyProfiles = buildJockeyProfiles();
  let wins=0, exactas=0, trifectas=0, totalRaces=0, winReturn=0, winInvest=0;
  for (const rn of allRaceNums) {
    const rr = cr.races[rn];
    const r = getRace(rn);
    if (!r || !rr?.finishers?.length) continue;
    const ranked = rankedHorses(r);
    if (!ranked.length) continue;
    const m3 = ranked.slice(0,3).map(h=>normName(h.name));
    const f = rr.finishers;
    totalRaces++;
    winInvest += 2;
    const w1hit = f[0] && normName(f[0].name) === normName(ranked[0]?.name||'');
    if (w1hit) { wins++; winReturn += f[0].win || 0; }
    if (f[0]&&f[1] && m3.includes(normName(f[0].name)) && m3.includes(normName(f[1].name))) exactas++;
    if (f[0]&&f[1]&&f[2] && [f[0],f[1],f[2]].every(x=>m3.includes(normName(x.name)))) trifectas++;
  }
  const roiNum = winInvest > 0 ? ((winReturn - winInvest) / winInvest * 100) : null;
  const roiStr = roiNum !== null ? (roiNum >= 0 ? '+' : '') + roiNum.toFixed(0) + '%' : '—';
  const roiColor = roiNum === null ? 'var(--text2)' : roiNum >= 0 ? 'var(--green)' : 'var(--red)';

  // ── Pick 3 P&L: $27/ticket (3×3×3 box at $1), budget = $27×(races-2) ────
  const top3Names = raceNum => {
    const race = getRace(raceNum);
    return race ? rankedHorses(race).slice(0,3).map(h => normName(h.name)) : [];
  };

  let p3Budget = 0, p3Return = 0, p3Hits = 0, p3Tickets = 0;
  const p3Seq = []; // track each ticket for display

  for (let i = 2; i < allRaceNums.length; i++) {
    const [r1, r2, r3] = [allRaceNums[i-2], allRaceNums[i-1], allRaceNums[i]];
    const rr1 = cr.races[r1], rr2 = cr.races[r2], rr3 = cr.races[r3];
    if (!rr1?.finishers?.length || !rr2?.finishers?.length || !rr3?.finishers?.length) continue;
    if (!rr3.exotics?.['Pick 3']) continue; // no Pick 3 offered for this sequence
    p3Tickets++;
    p3Budget += 27;
    const leg1hit = top3Names(r1).includes(normName(rr1.finishers[0].name));
    const leg2hit = top3Names(r2).includes(normName(rr2.finishers[0].name));
    const leg3hit = top3Names(r3).includes(normName(rr3.finishers[0].name));
    const allHit  = leg1hit && leg2hit && leg3hit;
    let payout = 0;
    if (allHit) {
      p3Hits++;
      const p3data = rr3.exotics?.['Pick 3'];
      if (p3data?.payout) {
        const base = rr3.payoutBase ?? 2;
        payout = p3data.payout / base;
        p3Return += payout;
      }
    }
    p3Seq.push({ r1, r2, r3, allHit, payout });
  }

  const p3Net    = p3Return - p3Budget;
  const p3Roi    = p3Budget > 0 ? (p3Net / p3Budget * 100) : null;
  const p3NetStr = '$' + Math.abs(p3Net).toFixed(2);
  const p3NetColor = p3Net >= 0 ? 'var(--green)' : 'var(--red)';
  const p3RoiStr = p3Roi !== null ? (p3Roi >= 0 ? '+' : '') + p3Roi.toFixed(0) + '%' : '—';

  // Restore jockey profiles so subsequent renders (WPS tab) use the original cached profiles
  State.jockeyProfiles = savedProfilesRV;

  // Build summary bar using active bet type from computeTrackSummary
  const _cts = computeTrackSummary(t);
  const _bs  = getBetStats(_cts);
  const bt   = AlgoState.betType || 'pick3';

  let betBarHtml = '';
  if (_bs && _bs.budget > 0) {
    const bNet    = _bs.net;
    const bRoi    = _bs.roi;
    const bNetStr = '$' + Math.abs(bNet).toFixed(2);
    const bNetCol = bNet >= 0 ? 'var(--green)' : 'var(--red)';
    const bRoiStr = bRoi !== null ? (bRoi >= 0 ? '+' : '') + bRoi.toFixed(0) + '%' : '—';

    // Bet-type specific label + cost note
    const betMeta = {
      pick3:   `Pick 3 ($27/ticket · 3×3×3)`,
      pick4:   `Pick 4 ($81/ticket · 3×3×3×3)`,
      wps:     `WPS ($6/race · Win+Place+Show)`,
      exacta2: `Exacta Box 2 ($2/race · 2 perms)`,
      exacta3: `Exacta Box 3 ($6/race · 6 perms)`,
      trifBox: `Trifecta Box 3 ($6/race · 6 perms)`,
      sfBox:   `Super Box 4 ($24/race · 24 perms)`,
    };

    const hitsHtml = _bs.hits !== null
      ? `<div class="p3-stat"><span class="p3-val">${_bs.hits}</span><span class="p3-sub">hits</span></div>`
      : '';

    // Pick 3 also shows per-ticket chips
    const p3ChipsHtml = bt === 'pick3' ? p3Seq.map(s =>
      `<span class="p3-hit-chip ${s.allHit?'hit':'miss'}" title="Races ${s.r1}-${s.r2}-${s.r3}${s.allHit?' · $'+s.payout.toFixed(2):''}">
        ${s.r1}-${s.r2}-${s.r3}${s.allHit?' $'+s.payout.toFixed(2):''}
      </span>`).join('') : '';

    betBarHtml = `
    <div class="p3-bar">
      <span class="p3-label">${betMeta[bt] || _bs.label}</span>
      <div class="p3-stat"><span class="p3-val">$${_bs.budget.toFixed(0)}</span><span class="p3-sub">budget</span></div>
      ${hitsHtml}
      <div class="p3-stat"><span class="p3-val ${bNet>=0?'p3-net-pos':'p3-net-neg'}">${bNet>=0?'+':'-'}${bNetStr}</span><span class="p3-sub">net</span></div>
      <div class="p3-stat"><span class="p3-val" style="color:${bNetCol}">${bRoiStr}</span><span class="p3-sub">ROI</span></div>
      <div style="width:1px;height:24px;background:var(--border);flex-shrink:0"></div>
      ${totalRaces > 0 ? `
      <div class="p3-stat"><span class="p3-val">${wins}/${totalRaces}</span><span class="p3-sub">win</span></div>
      <div class="p3-stat"><span class="p3-val">${exactas}/${totalRaces}</span><span class="p3-sub">exacta</span></div>
      <div class="p3-stat"><span class="p3-val">${trifectas}/${totalRaces}</span><span class="p3-sub">trifecta</span></div>` : ''}
      <div style="margin-left:auto;display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap">
        ${p3ChipsHtml}
        <button class="results-refresh-btn" style="margin-left:0.4rem" onclick="loadResults(true)">↻</button>
      </div>
    </div>`;
  } else {
    betBarHtml = `
    <div class="p3-bar">
      ${totalRaces > 0 ? `
      <div class="p3-stat"><span class="p3-val">${wins}/${totalRaces}</span><span class="p3-sub">win</span></div>
      <div class="p3-stat"><span class="p3-val">${exactas}/${totalRaces}</span><span class="p3-sub">exacta</span></div>
      <div class="p3-stat"><span class="p3-val">${trifectas}/${totalRaces}</span><span class="p3-sub">trifecta</span></div>` : ''}
      <button class="results-refresh-btn" style="margin-left:auto" onclick="loadResults(true)">↻</button>
    </div>`;
  }
  const p3BarHtml = betBarHtml;

  const summaryHtml = '';

  // ── Per-race view ────────────────────────────────────────────
  if (!raceResults) {
    el.innerHTML = `<div class="results-wrap">${p3BarHtml}${summaryHtml}
      <div class="results-no-data">No results for Race ${State.activeRace} yet.</div>
    </div>`;
    return;
  }

  // Base bet as reported by HRN in the exotic table header (e.g. $2); win/place/show always $2
  const exoticBase = raceResults.payoutBase ?? 2;
  const per1 = (pool, amt) => {
    const base = ['Win','Place','Show'].includes(pool) ? 2 : exoticBase;
    return (amt / base).toFixed(2);
  };

  const race = getRace(State.activeRace);
  // Sort by raw score (same order as scores table and bet area)
  const ranked = race ? rankedHorses(race).slice().sort((a,b) => b.score - a.score) : [];
  const top3 = ranked.slice(0,3).map(h=>normName(h.name));
  const top4 = ranked.slice(0,4).map(h=>normName(h.name));
  const f = raceResults.finishers || [];

  const winHit      = f[0] && normName(f[0].name) === normName(ranked[0]?.name||'');
  const exactaHit   = f[0]&&f[1] && top3.includes(normName(f[0].name)) && top3.includes(normName(f[1].name));
  const trifectaHit = f[0]&&f[1]&&f[2] && [f[0],f[1],f[2]].every(x=>top3.includes(normName(x.name)));
  const sfctaHit    = f[0]&&f[1]&&f[2]&&f[3] && [f[0],f[1],f[2],f[3]].every(x=>top4.includes(normName(x.name)));

  const badge = (hit, label) => `<span class="results-hit ${hit?'hit':'miss'}">${hit?'✓':'✗'} ${label}</span>`;
  const ordinal = n => n===1?'1st':n===2?'2nd':n===3?'3rd':n+'th';

  const posColor = pos => pos === 0 ? 'var(--green)' : pos === 1 ? '#5b9bd5' : pos === 2 ? '#b07fd4' : null;
  const modelCol = ranked.slice(0,4).map((h,i) => {
    const actualPos = f.findIndex(x=>normName(x.name)===normName(h.name));
    const col = actualPos >= 0 ? posColor(actualPos) : null;
    const posNoteCol = col || 'var(--text3)';
    const posNote = actualPos >= 0 ? `<span style="font-size:0.65rem;color:${posNoteCol};margin-left:0.25rem">→${ordinal(actualPos+1)}</span>` : '';
    const nameStyle = col ? `color:${col};font-weight:700` : '';
    return `<div class="results-row">
      <span class="results-row-pos">#${h.post}</span>
      <span class="results-row-name" style="${nameStyle}">${h.name} <span style="color:${col || 'var(--text1)'}"> (${toML(h.morning_line)})</span>${posNote}</span>
      <span class="results-row-pct">${(h._combinedProb*100).toFixed(0)}%</span>
    </div>`;
  }).join('');

  const actualCol = f.map((fin, i) => {
    const inModel = top3.includes(normName(fin.name));
    const col = posColor(i);
    const pay1 = fin.win ? `$${per1('Win', fin.win)}` : fin.place ? `$${per1('Place', fin.place)}` : fin.show ? `$${per1('Show', fin.show)}` : '';
    const nameStyle = col ? `color:${col};font-weight:700` : !inModel ? 'color:var(--text3)' : '';
    return `<div class="results-row">
      <span class="results-row-pos">#${fin.pp}</span>
      <span class="results-row-name" style="${nameStyle}">${fin.name}${!inModel?'<span style="font-size:0.58rem;color:var(--red);margin-left:0.3rem">UNRANKED</span>':''}</span>
      ${pay1 ? `<span class="results-row-pay">${pay1}</span>` : ''}
    </div>`;
  }).join('') + (raceResults.alsoRans?.length ? `<div style="font-size:0.68rem;color:var(--text2);margin-top:0.35rem">Also: ${raceResults.alsoRans.join(', ')}</div>` : '');

  const exoticsHtml = Object.entries(raceResults.exotics||{})
    .filter(([pool]) => ['Exacta','Trifecta','Superfecta','Pick 3','Consolation Pick 3'].includes(pool))
    .map(([pool, data]) => {
      const hit = pool==='Exacta'?exactaHit : pool==='Trifecta'?trifectaHit : pool==='Superfecta'?sfctaHit : null;
      return `<span class="results-exotic-chip ${hit===true?'hit':''}">
        <span style="color:var(--text2);font-size:0.68rem">${pool}</span>
        <span style="color:var(--text2)">${data.finish}</span>
        <span style="color:var(--green);font-weight:700">$${per1(pool, data.payout)}</span>
        ${hit===true?'<span style="color:var(--green);font-size:0.65rem">✓</span>':''}
      </span>`;
    }).join('');

  el.innerHTML = `<div class="results-wrap">
    ${p3BarHtml}
    ${summaryHtml}
    <div class="results-race-hdr">
      <span class="results-race-hdr-title">Race ${State.activeRace}</span>
      ${badge(winHit,'Win')} ${badge(exactaHit,'Exacta Box')} ${badge(trifectaHit,'Trifecta Box')}
      ${sfctaHit ? badge(true,'Superfecta Box') : ''}
    </div>
    <div class="results-grid">
      <div><div class="results-col-label">Model Picks</div>${modelCol}</div>
      <div><div class="results-col-label">Actual Finish</div>${actualCol}</div>
    </div>
    ${exoticsHtml ? `<div class="results-exotics">${exoticsHtml}</div>` : ''}
    ${raceResults.fractions ? `<div class="results-fractions">⏱ ${raceResults.fractions}</div>` : ''}
  </div>`;
}

async function fetchResultsSilent(track, force) {
  const t = track || currentTrack();
  if (!t) return;
  try {
    const todayYMD = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const isToday = t.dateRaw === todayYMD;
    const forceFlag = (force || isToday) ? '&force=1' : '';
    const resp = await fetch(`/api/results?trackCode=${t.trackCode}&date=${t.dateRaw}${forceFlag}`);
    const data = await resp.json();
    if (!data.error) {
      State.results[rKey(t)] = data;
      applyResultScratches(data, t);
      render();
    }
  } catch {}
}

async function fetchAllTrackResults(tracks) {
  await Promise.all(tracks.map(t => fetchResultsSilent(t)));
  fetchAllTimeSummary();
}

function applyResultScratches(results, t) {
  // Horses in the DRF data that don't appear in finishers or also-rans ran scratched.
  if (!t) t = currentTrack();
  if (!t) return;
  let changed = false;
  for (const race of t.races) {
    const rr = results.races?.[race.number];
    if (!rr) continue;
    const ran = new Set([
      ...(rr.finishers || []).map(f => normName(f.name)),
      ...(rr.alsoRans  || []).map(n => normName(n)),
    ]);
    const key = `${t.trackCode}_${t.dateRaw}_${race.number}`;
    const existing = State.scratches[key] || new Set();
    for (const h of race.horses) {
      if (!ran.has(normName(h.name)) && !existing.has(h.post)) {
        existing.add(h.post);
        State.scratches[key] = existing;
        changed = true;
      }
    }
  }
  if (changed) saveScratches();
}

function savePredictions(track) {
  const t = track || currentTrack();
  const cr = t ? State.results[rKey(t)] : null;
  if (!t || !cr) return;
  // Save ranked scores for each race that has results
  const savedActive = State.activeTrack;
  const trackIdx = State.tracks.indexOf(t);
  // Temporarily point activeTrack to this track so rankedHorses uses correct context
  if (trackIdx >= 0) State.activeTrack = trackIdx;
  const races = {};
  for (const race of t.races) {
    if (!cr.races?.[race.number]) continue;
    const ranked = rankedHorses(race);
    races[race.number] = ranked.map(h => {
      const d = h._dbg || {};
      return {
        name: h.name, pp: h.post,
        score: Math.round(h.score),
        winPct: parseFloat(d.winPct || 0),
        nFig: parseFloat(d.nFig || 0),
        nBest: parseFloat(d.nBest || 0),
        nForm: parseFloat(d.nForm || 0),
        nClose: parseFloat(d.nClose || 0),
        nLatePace: parseFloat(d.nLatePace || 0),
        nML: parseFloat(d.nML || 0),
        jMult: parseFloat(d.jMult || 1),
        tMult: parseFloat(d.tMult || 1),
      };
    });
  }
  State.activeTrack = savedActive; // restore
  // Write predictions into in-memory state so computeTrackSummary can use them immediately
  for (const [rn, preds] of Object.entries(races)) {
    if (cr.races?.[rn]) cr.races[rn].predictions = preds;
  }
  return fetch('/api/predictions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ trackCode: t.trackCode, date: t.dateRaw, races }),
  }).catch(() => {});
}

const FACTOR_LABELS = {
  nML: 'Morn. Line', nFig: 'Speed Avg', nBest: 'Best Fig',
  nForm: 'Form', nClose: 'Close', nLatePace: 'Late Pace',
  jMult: 'Jockey', tMult: 'Trainer',
};

async function renderAllDaysView(el) {
  if (!State.allDaysData) {
    el.innerHTML = `<div class="alldays-loading">Loading…</div>`;
    try {
      const resp = await fetch('/api/results/all');
      State.allDaysData = await resp.json();
    } catch {
      el.innerHTML = `<div class="alldays-loading">Failed to load cross-day data.</div>`;
      return;
    }
  }

  const db = State.allDaysData;
  const entries = Object.entries(db).sort((a, b) => b[0].localeCompare(a[0])); // newest first

  // ── Compute per-day stats ────────────────────────────────────
  const days = [];
  let totRaces = 0, totWins = 0, totExactas = 0, totTrifectas = 0;
  let totNet = 0, totBudget = 0;
  const missFactor = {}; // factor → {better: n, total: n}
  const FACTORS = Object.keys(FACTOR_LABELS);

  for (const [key, entry] of entries) {
    let dRaces = 0, dWins = 0, dExactas = 0, dTrifectas = 0;
    let dWinInvest = 0, dWinReturn = 0;
    let dP3Budget = 0, dP3Return = 0;
    const norm = s => (s||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    const raceNums = Object.keys(entry.races || {}).map(Number).sort((a,b)=>a-b);
    const top3ForRace = rn => {
      const preds = entry.races?.[rn]?.predictions;
      if (!preds?.length) return [];
      return [...preds].sort((a,b) => b.score - a.score).slice(0,3).map(p => norm(p.name));
    };
    for (const rn of raceNums) {
      const rr = entry.races[rn];
      const f = rr?.finishers;
      const preds = rr?.predictions;
      if (!f?.length || !preds?.length) continue;
      dRaces++;
      dWinInvest += 2;
      const ranked = [...preds].sort((a,b) => b.score - a.score);
      const pick1 = ranked[0];
      const top3 = top3ForRace(rn);
      const winHit = norm(f[0].name) === norm(pick1?.name || '');
      if (winHit) { dWins++; dWinReturn += f[0].win || 0; }
      if (f[1] && top3.includes(norm(f[0].name)) && top3.includes(norm(f[1].name))) dExactas++;
      if (f[2] && [f[0],f[1],f[2]].every(x => top3.includes(norm(x.name)))) dTrifectas++;
      if (!winHit) {
        const winner = preds.find(p => norm(p.name) === norm(f[0].name));
        if (winner && pick1) {
          for (const fk of FACTORS) {
            if (!missFactor[fk]) missFactor[fk] = { better: 0, total: 0 };
            missFactor[fk].total++;
            if ((winner[fk] || 0) > (pick1[fk] || 0)) missFactor[fk].better++;
          }
        }
      }
    }
    // P3 loop — same logic as computeAllTimeSummary
    for (let i = 2; i < raceNums.length; i++) {
      const [r1, r2, r3] = [raceNums[i-2], raceNums[i-1], raceNums[i]];
      const rr1 = entry.races[r1], rr2 = entry.races[r2], rr3 = entry.races[r3];
      if (!rr1?.finishers?.length || !rr2?.finishers?.length || !rr3?.finishers?.length) continue;
      if (!rr3.exotics?.['Pick 3']) continue;
      dP3Budget += 27;
      dP3Return -= 27;
      if (top3ForRace(r1).includes(norm(rr1.finishers[0].name)) &&
          top3ForRace(r2).includes(norm(rr2.finishers[0].name)) &&
          top3ForRace(r3).includes(norm(rr3.finishers[0].name))) {
        const p3data = rr3.exotics['Pick 3'];
        if (p3data?.payout) dP3Return += p3data.payout / (rr3.payoutBase ?? 2);
      }
    }
    if (dRaces === 0) continue;
    const dWinNet = dWinReturn - dWinInvest;
    const dTotalNet = dWinNet + dP3Return;
    const dTotalBudget = dWinInvest + dP3Budget;
    const roi = dTotalBudget > 0 ? (dTotalNet / dTotalBudget * 100) : null;
    days.push({ key, entry, dRaces, dWins, dExactas, dTrifectas, dTotalNet, dTotalBudget, roi });
    totRaces += dRaces; totWins += dWins; totExactas += dExactas; totTrifectas += dTrifectas;
    totNet += dTotalNet; totBudget += dTotalBudget;
  }

  const totRoi = totBudget > 0 ? (totNet / totBudget * 100) : null;
  const pct = (n, d) => d > 0 ? Math.round(n/d*100) + '%' : '—';
  const roiStr = r => r === null ? '—' : (r >= 0 ? '+' : '') + r.toFixed(0) + '%';
  const roiColor = r => r === null ? 'var(--text2)' : r >= 0 ? 'var(--green)' : 'var(--red)';
  const fmtDate = ymd => {
    const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${MONTHS[+ymd.slice(4,6)]} ${+ymd.slice(6,8)}, ${ymd.slice(0,4)}`;
  };

  // ── Factor analysis bars ─────────────────────────────────────
  const factorRows = FACTORS.map(fk => {
    const d = missFactor[fk];
    if (!d || d.total < 5) return '';
    const pctBetter = Math.round(d.better / d.total * 100);
    const barColor = pctBetter >= 60 ? 'var(--red)' : pctBetter <= 40 ? 'var(--green)' : 'var(--text3)';
    return `<div class="factor-row">
      <span class="factor-label">${FACTOR_LABELS[fk]}</span>
      <div class="factor-bar-wrap"><div class="factor-bar" style="width:${pctBetter}%;background:${barColor}"></div></div>
      <span class="factor-pct" style="color:${barColor}">${pctBetter}%</span>
    </div>`;
  }).join('');

  const hasMissData = Object.values(missFactor).some(d => d.total >= 5);

  const fmtNet = n => (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);
  el.innerHTML = `
    <div class="alldays-agg">
      <div class="alldays-stat"><div class="alldays-stat-val">${totRaces}</div><div class="alldays-stat-label">Races</div></div>
      <div class="alldays-stat"><div class="alldays-stat-val">${pct(totWins,totRaces)}</div><div class="alldays-stat-label">Win %</div></div>
      <div class="alldays-stat"><div class="alldays-stat-val">${pct(totExactas,totRaces)}</div><div class="alldays-stat-label">Exacta %</div></div>
      <div class="alldays-stat"><div class="alldays-stat-val">${pct(totTrifectas,totRaces)}</div><div class="alldays-stat-label">Trifecta %</div></div>
      <div class="alldays-stat"><div class="alldays-stat-val" style="color:${roiColor(totRoi)}">${roiStr(totRoi)}</div><div class="alldays-stat-label">ROI</div></div>
      <div class="alldays-stat"><div class="alldays-stat-val" style="color:${roiColor(totRoi)}">${fmtNet(totNet)}</div><div class="alldays-stat-label">P&L</div></div>
    </div>
    <table class="alldays-table">
      <thead><tr>
        <th>Date</th><th>Track</th><th>Races</th>
        <th>Win</th><th>Exacta Box</th><th>Trifecta Box</th><th>ROI</th><th>P&L</th>
      </tr></thead>
      <tbody>
        ${days.map(d => `<tr>
          <td>${fmtDate(d.entry.dateYMD)}</td>
          <td style="color:var(--text1);font-weight:600">${d.entry.trackCode}</td>
          <td>${d.dRaces}</td>
          <td class="${d.dWins>0?'hit-cell':'miss-cell'}">${d.dWins}/${d.dRaces}</td>
          <td class="${d.dExactas>0?'hit-cell':'miss-cell'}">${d.dExactas}/${d.dRaces}</td>
          <td class="${d.dTrifectas>0?'hit-cell':'miss-cell'}">${d.dTrifectas}/${d.dRaces}</td>
          <td class="${(d.roi||0)>=0?'roi-pos':'roi-neg'}">${roiStr(d.roi)}</td>
          <td class="${d.dTotalNet>=0?'roi-pos':'roi-neg'}">${fmtNet(d.dTotalNet)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    ${hasMissData ? `
      <div class="alldays-section">Factor Miss Analysis — when model's top pick lost, winner had better score on:</div>
      <div style="font-size:0.67rem;color:var(--text2);padding:0.35rem 1rem 0.1rem">Red = winner outranked #1 pick here often → factor may be underweighted. Green = rarely → may be overweighted.</div>
      ${factorRows}
    ` : totRaces > 0 ? `<div class="alldays-no-pred">Factor analysis available once predictions are saved for ≥5 miss races. Load results for each day you want to include.</div>` : ''}`;
}

async function loadResults(force = false) {
  const t = currentTrack();
  if (!t) return;
  State.activeBet = 'results';
  const el = document.getElementById('bet-area');
  el.innerHTML = `<div class="results-no-data">
    <div class="loading-spinner" style="width:32px;height:32px;margin:0 auto 0.75rem"></div>
    <div style="color:var(--text2)">Fetching results from HRN…</div>
  </div>`;
  try {
    const resp = await fetch(`/api/results?trackCode=${t.trackCode}&date=${t.dateRaw}${force?'&force=1':''}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    State.results[t.trackCode] = data;
    applyResultScratches(data);
    savePredictions();
    render();
  } catch (e) {
    el.innerHTML = `<div class="results-no-data">
      <div style="color:var(--red);margin-bottom:0.5rem">Failed: ${e.message}</div>
      <button class="results-fetch-btn" onclick="loadResults()">Retry</button>
    </div>`;
  }
}

  const horses = rawHorses.slice().sort((a, b) => b.score - a.score);

  const nColor = n => {

            <th colspan="4" class="st-sep" style="text-align:center">COMBINED MODEL</th>
          </tr>
          <tr>

function renderBetSlip() {
  const entries = document.getElementById('slip-entries');
  if (!State.tracks.length) {
    entries.innerHTML = '<div class="p3list-empty">No race data loaded.</div>';
    return;
  }

  // Save active track state, score each track in turn, then restore
  const savedActive = State.activeTrack;
  const savedProfiles = State.jockeyProfiles;

  let html = '';
  for (let ti = savedActive; ti <= savedActive; ti++) {
    const t = State.tracks[ti];
    State.activeTrack = ti;
    State.jockeyProfiles = (ti === savedActive) ? savedProfiles : buildJockeyProfiles();

    const results = State.results[rKey(t)];

    // Precompute top-3 names per race (already in correct track context)
    const top3ByRace = {};
    for (const race of t.races) {
      top3ByRace[race.number] = rankedHorses(race).slice(0, 3).map(h => normName(h.name));
    }

    // Find which races were part of a winning P3 leg
    const p3HitRaces = new Set();
    if (results) {
      const rNums = Object.keys(results.races).map(Number).sort((a, b) => a - b);
      for (let i = 2; i < rNums.length; i++) {
        const [r1, r2, r3] = [rNums[i - 2], rNums[i - 1], rNums[i]];
        const w1 = results.races[r1]?.finishers?.[0];
        const w2 = results.races[r2]?.finishers?.[0];
        const w3 = results.races[r3]?.finishers?.[0];
        if (!w1 || !w2 || !w3) continue;
        if ((top3ByRace[r1] || []).includes(normName(w1.name)) &&
            (top3ByRace[r2] || []).includes(normName(w2.name)) &&
            (top3ByRace[r3] || []).includes(normName(w3.name))) {
          p3HitRaces.add(r3);
        }
      }
    }

    const raceRows = t.races.map(race => {
      const top3Names = top3ByRace[race.number] || [];
      const ranked = rankedHorses(race);
      const top3 = ranked.slice(0, 4);
      const finishers = results?.races?.[race.number]?.finishers || [];
      const finishPos = {};
      finishers.slice(0, 4).forEach(f => { finishPos[normName(f.name)] = f.pos; });
      const winnerNorm = finishers[0] ? normName(finishers[0].name) : null;
      const winnerHit = winnerNorm && top3Names.includes(winnerNorm);
      const hasResult = finishers.length > 0;
      const p3Hit = p3HitRaces.has(race.number);
      const picksHtml = top3.length
        ? top3.map(h => {
            const pos = hasResult ? (finishPos[normName(h.name)] ?? null) : null;
            const cls = pos === 1 ? ' p3list-win'
                      : pos === 2 ? ' p3list-place'
                      : pos === 3 ? ' p3list-show'
                      : pos === 4 ? ' p3list-fourth'
                      : hasResult && !winnerHit ? ' p3list-miss'
                      : '';
            return `<span class="pp-num${cls}">${h.post}</span>`;
          }).join('<span style="color:var(--text3)"> · </span>')
        : '<span style="color:var(--text3);font-size:0.72rem">—</span>';
      return `<div class="p3list-race" id="p3race-${race.number}">
        <span class="p3list-race-label${p3Hit ? ' p3list-race-hit' : ''}">Race ${race.number}</span>
        <span class="p3list-race-picks">${picksHtml}</span>
      </div>`;
    }).join('');

    html += `<div class="p3list-track">
      <div class="p3list-track-header">
        <div class="p3list-track-name">${t.track}</div>
        <div class="p3list-track-date">${t.date}</div>
      </div>
      ${raceRows}
    </div>`;
  }

  State.activeTrack = savedActive;
  State.jockeyProfiles = savedProfiles;

  entries.innerHTML = html;
}

function selectTrack(i) {
  const prevTab = State.activeBet;
  State.activeTrack = i;
  const t = currentTrack();
  State.activeRace = t.races[0]?.number || 1;
  State.selections = { win: [], exacta: [], trifecta: [], superfecta: [] };
  State.pick3 = { leg1: [], leg2: [], leg3: [] };
  State.activeBet = (prevTab === 'results' || prevTab === 'scores') ? prevTab : 'win';
  State.showAllDays = false;
  State.allDaysData = null;
  State.jockeyProfiles = buildJockeyProfiles();
  render();
  if (!currentResults()) fetchResultsSilent();
}

function selectRace(n) {
  State.activeRace = n;
  State.selections = { win: [], exacta: [], trifecta: [], superfecta: [] };
  State.pick3 = { leg1: [], leg2: [], leg3: [] };
  const raceCount = currentTrack().races.length;
  if (State.activeBet === 'pick3' && n > raceCount - 2) State.activeBet = 'win';
  render();
  // Highlight active race in Pick 3 list
  document.querySelectorAll('.p3list-race').forEach(el => el.classList.remove('p3list-active'));
  const target = document.getElementById(`p3race-${n}`);
  if (target) {
    target.classList.add('p3list-active');
    target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function selectBet(type) {
  const raceCount = currentTrack().races.length;
  if (type === 'pick3' && State.activeRace > raceCount - 2) return;
  State.activeBet = type;
  render();
}

function toggleHorse(post) {
  const key = State.activeBet;
  const cfg = BET_TYPES[key];
  const sels = State.selections[key];
  const idx = sels.indexOf(post);
  if (idx >= 0) {
    sels.splice(idx, 1);
  } else {
    if (sels.length >= cfg.max) { flashWarning(); return; }
    sels.push(post);
  }
  render();
}

function togglePick3(legKey, post) {
  const sels = State.pick3[legKey];
  const idx = sels.indexOf(post);
  if (idx >= 0) {
    sels.splice(idx, 1);
  } else {
    if (sels.length >= 3) { flashWarning(); return; }
    sels.push(post);
  }
  render();
}

function loadPicks() {
  const p = getPicks(State.activeRace);
  if (!p) { toast('No picks for this race', 'error'); return; }
  if (State.activeBet === 'pick3') {
    const r1 = State.activeRace, r2 = r1 + 1, r3 = r1 + 2;
    const p1 = getPicks(r1), p2 = getPicks(r2), p3 = getPicks(r3);
    State.pick3.leg1 = (p1?.pick3_legs?.leg1 || p1?.trifecta || []).slice(0, 3);
    State.pick3.leg2 = (p2?.pick3_legs?.leg1 || p2?.trifecta || []).slice(0, 3);
    State.pick3.leg3 = (p3?.pick3_legs?.leg1 || p3?.trifecta || []).slice(0, 3);
  } else {
    const picks = p[State.activeBet];
    if (!picks || !picks.length) { toast('No picks available', 'error'); return; }
    State.selections[State.activeBet] = [...picks];
  }
  render();
  toast('Expert picks loaded ✓');
}

function addToSlip() {
  let bet;
  if (State.activeBet === 'pick3') {
    const l1 = State.pick3.leg1, l2 = State.pick3.leg2, l3 = State.pick3.leg3;
    if (!l1.length || !l2.length || !l3.length) return;
    const r1 = getRace(State.activeRace), r2 = getRace(State.activeRace + 1), r3 = getRace(State.activeRace + 2);
    const combos = l1.length * l2.length * l3.length;
    const cost = combos * 0.50;
    const horsesOf = (race, posts) => posts.map(p => race.horses.find(h => h.post === p)?.name || p).join(', ');
    bet = {
      type: 'PICK 3',
      races: `Races ${State.activeRace}–${State.activeRace + 2}`,
      horses: `R${State.activeRace}: ${horsesOf(r1, l1)} | R${State.activeRace + 1}: ${horsesOf(r2, l2)} | R${State.activeRace + 2}: ${horsesOf(r3, l3)}`,
      cost,
      combos
    };
    State.pick3 = { leg1: [], leg2: [], leg3: [] };
  } else {
    const cfg = BET_TYPES[State.activeBet];
    const sels = State.selections[State.activeBet];
    if (!cfg.ready(sels.length)) return;
    const race = getRace(State.activeRace);
    const names = sels.map(p => race.horses.find(h => h.post === p)?.name || p).join(', ');
    const cost = cfg.cost(sels.length);
    bet = {
      type: cfg.label.toUpperCase(),
      races: `Race ${State.activeRace} — ${currentTrack().track}`,
      horses: names,
      cost,
      combos: cfg.combos(sels.length)
    };
    State.selections[State.activeBet] = [];
  }
  State.betSlip.push(bet);
  saveSlip();
  toast('Added to Bet Slip ✓');
  render();
}

function removeBet(i) {
  State.betSlip.splice(i, 1);
  saveSlip();
  render();
}

function clearSlip() {
  if (State.betSlip.length === 0) return;
  if (!confirm('Clear all bets from slip?')) return;
  State.betSlip = [];
  saveSlip();
  render();
}

function placeBets() {
  if (State.betSlip.length === 0) return;
  const total = State.betSlip.reduce((s, b) => s + b.cost, 0);
  toast(`🎉 ${State.betSlip.length} bet${State.betSlip.length > 1 ? 's' : ''} placed! Total: $${total.toFixed(2)}`);
  State.betSlip = [];
  saveSlip();
  render();
}

function flashWarning() {
  const el = document.getElementById('cost-bar');
  el.classList.remove('warn-flash');
  void el.offsetWidth;
  el.classList.add('warn-flash');
  setTimeout(() => el.classList.remove('warn-flash'), 500);
}

let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast${type === 'error' ? ' error' : ''}`;
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── ALGO MANAGEMENT ────────────────────────────────────────────
const AlgoState = {
  algos: [],        // list from server
  activeAlgo: null, // { id, name, params } or null = Base
  agentAlgoId: null,// which algo the agent modal is open for
  pendingParams: null,
  pendingNote:   null,
  betType: localStorage.getItem('capper_bet_type') || 'pick3',
};

async function loadAlgos() {
  try {
    const [listRes, activeRes] = await Promise.all([
      fetch('/api/user/algos', { headers: authHeaders() }),
      fetch('/api/user/algos/active', { headers: authHeaders() }),
    ]);
    AlgoState.algos   = await listRes.json();
    AlgoState.activeAlgo = await activeRes.json();

function toggleAlgoDropdown(e) {

function renderAlgoDropdown() {

  html += `<div class="algo-dropdown-item algo-dropdown-base${!activeId ? ' active' : ''}" onclick="selectAlgo(null)">
    <span class="algo-dd-check">${!activeId ? '✓' : ''}</span>

  if (AlgoState.algos.length) {

      html += `<div class="algo-dropdown-item${isActive ? ' active' : ''}" onclick="selectAlgo(${a.id})">
        <span class="algo-dd-check">${isActive ? '✓' : ''}</span>
        <span class="algo-dd-name">${a.name}</span>
        <span class="algo-dd-open" onclick="event.stopPropagation();openAgentModal(${a.id})" title="Open agent">✎</span>
      </div>`;
    }

  html += '<div class="algo-dropdown-divider"></div>';

    <span class="algo-dd-check">+</span>

function buildAgentGreeting(algo) {
  const firstName = Auth.user?.first_name?.trim() || Auth.user?.username || 'there';
  const name = algo?.name || 'this algo';
  const p = algo?.params || DEFAULT_ALGO_PARAMS_CLIENT;

  // Describe the cheap and stakes focus based on top weights
  function topFactors(weights, n = 2) {
    const labels = { nML:'morning line', nLatePace:'late pace', nClose:'closing ability',
      nForm:'form consistency', nFig:'speed figures', nBest:'best figure ceiling',
      nTrend:'short-term trend', nLongTrend:'long-term trend' };
    return Object.entries(weights)
      .filter(([k]) => labels[k])
      .sort(([,a],[,b]) => b - a)
      .slice(0, n)
      .map(([k, v]) => `${labels[k]} (${Math.round(v * 100)}%)`)
      .join(' and ');
  }

  const cheapFocus  = topFactors(p.cheap  || DEFAULT_ALGO_PARAMS_CLIENT.cheap);
  const stakesFocus = topFactors(p.stakes || DEFAULT_ALGO_PARAMS_CLIENT.stakes);

  const dropoutNote = (p.dropoutMult ?? 1.30) >= 1.25
    ? ` It also applies a ${((p.dropoutMult ?? 1.30) * 100 - 100).toFixed(0)}% boost to horses that faded after being in contention — a proven misprice signal.`
    : '';

  return `Hey ${firstName}! You're looking at <strong>${name}</strong>.\n\n` +
    `For cheap claiming races it leans on ${cheapFocus}. In stakes races it shifts to ${stakesFocus}.${dropoutNote}\n\nWhere do you want to take it?`;
}

async function loadAgentHistory() {
  const id = AlgoState.agentAlgoId;
  if (!id) return;
  // Clear server-side chat so Claude starts fresh each session
  fetch('/api/chat/clear', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...authHeaders() },
    body: JSON.stringify({ algoId: id }),
  }).catch(() => {});
  // Greeting
  const el = document.getElementById('agent-messages');
  const algo = AlgoState.algos.find(a => a.id === id);
  const greeting = buildAgentGreeting(algo);
  el.innerHTML = `<div class="agent-msg assistant">${greeting.replace(/\n/g,'<br>')}</div>`;
  // Show change history summary (skip the 'Initial' snapshot)
  try {
    const res = await fetch(`/api/user/algos/${id}/history`, { headers: authHeaders() });
    const items = await res.json();
    const changes = Array.isArray(items) ? items.filter(h => h.note && h.note !== 'Initial').reverse() : [];
    if (changes.length) {
      const summaryLines = changes.map((h, i) =>
        `#${i + 1} — ${h.note} <span style="color:var(--text3);font-size:0.72rem">(${h.created_at?.slice(0,16).replace('T',' ') || ''})</span>`
      ).join('<br>');
      el.innerHTML += `<div class="agent-msg system"><strong>Changes so far:</strong><br>${summaryLines}</div>`;
    }
  } catch {}
}

async function loadAgentVersionHistory() {
  const id = AlgoState.agentAlgoId;
  if (!id) return;
  try {
    const res = await fetch(`/api/user/algos/${id}/history`, { headers: authHeaders() });
    const items = await res.json();
    const el = document.getElementById('agent-history-list');
    el.innerHTML = items.map(h => `
      <div class="agent-history-item">
        <div class="ah-note">${h.note || 'Update'}</div>
        <div class="ah-time">${h.created_at?.slice(0,16).replace('T',' ') || ''}
          <span class="agent-restore-btn" onclick="agentRestore(${h.id})" title="Restore this version">↩ restore</span>
        </div>
      </div>`).join('') || '<div style="font-size:0.75rem;color:var(--text3);padding:0.5rem">No history yet.</div>';
  } catch {}
}

function agentMsgHtml(role, content) {
  // Strip the JSON block from display — user doesn't need to see the raw action
  const clean = content.replace(/```json[\s\S]*?```/g, '').trim();
  return `<div class="agent-msg ${role}">${clean.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
}

function agentInputKeydown(e) {

async function agentSend() {
  const id    = AlgoState.agentAlgoId;
  const input = document.getElementById('agent-input');
  const msg   = input.value.trim();
  if (!msg || !id) return;

  const btn     = document.getElementById('agent-send-btn');
  const msgsEl  = document.getElementById('agent-messages');

  input.value = '';
  btn.disabled = true;
  msgsEl.innerHTML += agentMsgHtml('user', msg);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  // Thinking indicator
  const thinkId = 'agent-thinking';
  msgsEl.innerHTML += `<div class="agent-msg assistant" id="${thinkId}" style="opacity:0.5">Thinking…</div>`;
  msgsEl.scrollTop = msgsEl.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ message: msg, algoId: id }),
    });
    const data = await res.json();
    document.getElementById(thinkId)?.remove();

    if (!res.ok) throw new Error(data.error || 'Agent error');

    msgsEl.innerHTML += agentMsgHtml('assistant', data.reply);

    if (data.pendingParams) {
      AlgoState.pendingParams = data.pendingParams;
      AlgoState.pendingNote   = data.pendingNote;
      const changeNum = document.querySelectorAll('#agent-history-list .agent-history-item').length + 1;
      const label = `💡 Change #${changeNum}${data.pendingNote ? ': ' + data.pendingNote : ''}`;
      document.getElementById('agent-footer-label').textContent = label;
      document.getElementById('agent-saveas-btn').style.display = '';
      document.getElementById('agent-footer').style.display = 'flex';
    }

    msgsEl.scrollTop = msgsEl.scrollHeight;
  } catch (e) {
    document.getElementById(thinkId)?.remove();
    msgsEl.innerHTML += agentMsgHtml('assistant', '⚠ ' + e.message);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  btn.disabled = false;
  input.focus();
}

async function agentSaveChange() {
  // Save pending bet type
  if (AlgoState.pendingBetType) {
    const id = AlgoState.agentAlgoId;
    if (id) {
      await fetch(`/api/user/algos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ bet_type: AlgoState.pendingBetType }),
      });
      if (AlgoState.activeAlgo?.id === id) AlgoState.activeAlgo.bet_type = AlgoState.pendingBetType;
    } else {
      localStorage.setItem('capper_bet_type', AlgoState.pendingBetType);
    }
    AlgoState.pendingBetType = null;
    AlgoState.previousBetType = null;
  }
  // Save pending algo params
  const id = AlgoState.agentAlgoId;
  const { pendingParams, pendingNote } = AlgoState;
  if (pendingParams && id) {
    try {
      const res = await fetch(`/api/user/algos/${id}/apply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ params: pendingParams, note: pendingNote }),
      });
      if (!res.ok) throw new Error('Failed to save');
      const algo = AlgoState.algos.find(a => a.id === id);
      if (algo) algo.params = pendingParams;
      if (AlgoState.activeAlgo?.id === id) { AlgoState.activeAlgo.params = pendingParams; render(); }
      AlgoState.pendingParams = null;
      AlgoState.pendingNote   = null;
      const msgsEl = document.getElementById('agent-messages');
      msgsEl.innerHTML += '<div class="agent-msg system">✓ Change saved.</div>';
      msgsEl.scrollTop = msgsEl.scrollHeight;
      await loadAgentVersionHistory();
    } catch (e) { toast(e.message, 'error'); return; }
  }
  document.getElementById('agent-footer-label').textContent = '';
  document.getElementById('agent-footer').style.display = 'none';
  closeAgentModal();
}

async function agentSaveAsChange() {
  const params = AlgoState.pendingParams || AlgoState.activeAlgo?.params || null;
  const note   = AlgoState.pendingNote || 'Saved from base';
  const name = prompt('Save as new algo — enter a name:');
  if (!name?.trim()) return;
  try {
    const createRes = await fetch('/api/user/algos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ name: name.trim() }),
    });
    if (!createRes.ok) throw new Error('Failed to create algo');
    const { id: newId } = await createRes.json();
    const applyRes = params ? await fetch(`/api/user/algos/${newId}/apply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ params, note }),
    }) : { ok: true };
    if (!applyRes.ok) throw new Error('Failed to apply params');
    AlgoState.pendingParams = null;
    AlgoState.pendingNote   = null;
    await loadAlgos();
    document.getElementById('agent-footer-label').textContent = '';
    document.getElementById('agent-footer').style.display = 'none';
    closeAgentModal();
    toast(`Saved as "${name.trim()}" ✓`);
  } catch (e) { toast(e.message, 'error'); }
}

function agentCancelChange() {
  // Revert pending bet type
  if (AlgoState.pendingBetType) {
    AlgoState.betType = AlgoState.previousBetType;
    document.getElementById('agent-bet-type').value = AlgoState.previousBetType;
    AlgoState.pendingBetType = null;
    AlgoState.previousBetType = null;
    renderResultsOverviewBar();
    renderTrackTabs();
    if (State.activeTab === 'results') renderBetArea();
  }
  // Discard pending algo params
  if (AlgoState.pendingParams) {
    AlgoState.pendingParams = null;
    AlgoState.pendingNote   = null;
    const msgsEl = document.getElementById('agent-messages');
    msgsEl.innerHTML += '<div class="agent-msg system">Change discarded.</div>';
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  document.getElementById('agent-footer-label').textContent = '';
  document.getElementById('agent-footer').style.display = 'none';
  closeAgentModal();
}

async function agentRestore(historyId) {

// ── VOICE INPUT ─────────────────────────────────────────────────
let _recognition = null;
let _micActive = false;

function agentToggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice input not supported in this browser', 'error'); return; }

  if (_micActive) {
    _recognition?.stop();
    return;
  }

  const btn   = document.getElementById('agent-mic-btn');
  const input = document.getElementById('agent-input');

  _recognition = new SR();
  _recognition.lang = 'en-US';
  _recognition.interimResults = true;
  _recognition.continuous = false;

  let baseText = input.value;

  _recognition.onstart = () => {
    _micActive = true;
    btn.classList.add('recording');
    btn.title = 'Stop recording';
  };

  _recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    input.value = (baseText ? baseText + ' ' : '') + transcript;
  };

  _recognition.onend = () => {
    _micActive = false;
    btn.classList.remove('recording');
    btn.title = 'Voice input';
    // Auto-send if we got something new
    if (input.value.trim() && input.value.trim() !== baseText.trim()) agentSend();
  };

  _recognition.onerror = e => {
    _micActive = false;
    btn.classList.remove('recording');
    if (e.error !== 'aborted') toast('Mic error: ' + e.error, 'error');
  };

  _recognition.start();
}

async function submitLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  if (!username || !password) { errEl.textContent = 'Enter username and password'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.textContent = '';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');

    saveAuthToken(data.token);
    Auth.user = { username: data.username, isAdmin: data.isAdmin };
    onAuthSuccess();
  } catch (e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// Allow Enter key in login form
document.getElementById('login-username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-password').focus(); });
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') submitLogin(); });

function onAuthSuccess() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('user-badge').style.display = 'flex';
  document.getElementById('user-badge-name').textContent = Auth.user.username;
  document.getElementById('admin-header-btn').style.display = Auth.user.isAdmin ? 'inline-block' : 'none';
  loadAlgos();
  loadRaces();
}

async function logout() {
  try { await fetch('/api/auth/logout', { method: 'POST', headers: authHeaders() }); } catch {}
  clearAuthToken();
  // Reset app state
  State.tracks = [];
  State.results = {};
  State.allTimeDb = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('user-badge').style.display = 'none';
  document.getElementById('app-body').style.display = 'none';
  document.getElementById('results-overview-bar').style.display = 'none';
  document.getElementById('track-tabs').style.display = 'none';
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Sign In';
}

// ── INIT ───────────────────────────────────────────────────────
let _appVersion = null;
fetch('/api/version').then(r => r.json()).then(d => { _appVersion = d.mtime; }).catch(() => {});

// Check for existing session on load
(async () => {
  const savedToken = (() => { try { return localStorage.getItem('trifecta_token'); } catch { return null; } })();
  if (savedToken) {
    try {
      const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + savedToken } });
      if (res.ok) {
        const user = await res.json();
        Auth.token = savedToken;
        Auth.user = user;
        onAuthSuccess();
        return;
      }
    } catch {}
  }
  // No valid session — show login screen
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('loading-overlay').style.display = 'none';
})();
</script>
