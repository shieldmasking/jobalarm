const JOCKEY_TIER2 = new Set([
  'GEROUX FLORENT','HERNANDEZ B J JR','SAEZ GABRIEL','CANNON DECLAN',
  'LEPAROUX JULIEN R','BESCHIZZA ADAM','MORALES EDGAR','CONCEPCION AXEL',
  'TORRES JAIME A','HUSBANDS MICAH J','GRAHAM J','ACHARD ALEX',
]);
const JOCKEY_TURF_PREFERRED = new Set([
  'PRAT FLAVIEN','VELAZQUEZ J R','ROSARIO JOEL','CANNON DECLAN',
  'LEPAROUX JULIEN R','BESCHIZZA ADAM','HUSBANDS MICAH J',
]);

const TRAINER_PROFILES = {
  'PLETCHER TODD A':    { msw:1.22, allowance:1.18, stakes:1.15, default:1.12 },
  'BAFFERT BOB':        { msw:1.22, stakes:1.20, default:1.15 },
  'BROWN CHAD':         { turf:1.24, default:1.10 },
  'COX BRAD H':         { default:1.18 },
  'ASMUSSEN STEVEN M':  { default:1.12 },
  'MOTT WILLIAM I':     { turf:1.18, stakes:1.15, default:1.10 },
  'MOTION H GRAHAM':    { turf:1.22, default:1.08 },
  'CASSE MARK':         { turf:1.18, default:1.08 },
  'MAKER MICHAEL J':    { default:1.10 },
  'MCPEEK KENNETH G':   { default:1.08 },
  'STALL ALBERT M JR':  { default:1.07 },
  'DESORMEAUX J KEITH': { claiming:1.10, default:1.05 },
  'WARD WESLEY A':      { msw:1.20, default:1.10 },
  'SHARP JOE':          { default:1.05 },
};

const HOT_COMBOS = {
  'PLETCHER TODD A':    ['ORTIZ IRAD JR','VELAZQUEZ J R'],
  'COX BRAD H':         ['GAFFALIONE TYLER'],
  'ASMUSSEN STEVEN M':  ['GEROUX FLORENT'],
  'MAKER MICHAEL J':    ['PRAT FLAVIEN'],
  'MOTT WILLIAM I':     ['VELAZQUEZ J R'],
  'BROWN CHAD':         ['IRAD JR','PRAT FLAVIEN','ROSARIO JOEL'],
};

const TURF_SIRES = new Set([
  "KITTEN'S JOY","WAR FRONT","GALILEO","FRANKEL","DUBAWI","OSCAR PERFORMANCE",
  "GIFT BOX","KARAKONTIE","RECOLETOS","ENGLISH CHANNEL","CONGRATS","MENDELSSOHN",
  "GET STORMY","TORONADO","TEOFILO","CAPE CROSS","DANSILI","SHAMARDAL",
  "LOPE DE VEGA","SEA THE STARS","MEDAGLIA D'ORO","NO NAY NEVER","SHANCELOT",
]);
const DIRT_SIRES = new Set([
  "INTO MISCHIEF","GUN RUNNER","CURLIN","QUALITY ROAD","TAPIT","UNCLE MO",
  "AMERICAN PHAROAH","JUSTIFY","FROSTED","SPEIGHTSTOWN","MUNNINGS","KANTHAROS",
  "CITY OF LIGHT","CONSTITUTION","HONOR A. P.","IMPROBABLE","ARMY MULE",
  "VINO ROSSO","AUTHENTIC","VOLATILE","LIAM'S MAP","MAXIMUM SECURITY",
  "GIRVIN","COAL FRONT","CLASSIC EMPIRE","STAY THIRSTY","NOBLE BIRD",
  "OMAHA BEACH","MO TOWN","OUTWORK","CANDY RIDE","STREET SENSE",
]);

function getRaceCategory(race) {
  const cls = race.race_class;
  if (/md sp wt/i.test(cls)) return 'msw';
  if (/^md/i.test(cls)) return 'maiden_claiming';
  if (/^clm/i.test(cls)) return 'claiming';
  if (/^oclm/i.test(cls)) return 'opt_claimer';
  if (/^alw/i.test(cls)) return 'allowance';
  if (race.purse >= 150000) return 'stakes';
  return 'allowance';
}

// Convert net-profit ROI to a score multiplier.
// ROI scale: 0 = break-even, positive = profitable, negative = losing.
// Requires minimum starts to avoid small-sample noise.
// Range: 0.93 (losing badly) → 1.20 (very profitable)
function roiMultiplier(roi, starts, minStarts = 10) {
  if (roi == null || !starts || starts < minStarts) return null;
  const p   = getAlgoParams();
  const adj = roi * (p.roiScale ?? 0.06);
  return Math.max(p.roiFloor ?? 0.95, Math.min(p.roiCeiling ?? 1.20, 1.00 + adj));
}

// T/J combo ROI → multiplier. Minimum 8 starts to avoid single-race noise.
// Below 8 starts the T/J ROI is too volatile to penalize (or reward) confidently.
function tjRoiMultiplier(roi, starts) {
  if (roi == null || !starts || starts < 8) return null;
  const adj = roi * 0.08;
  return Math.max(0.92, Math.min(1.18, 1.00 + adj));
}

// Layoff modifier: multiplier based on days since last race × trainer quality.
// Good trainers are rewarded for freshening horses; cold barns are penalized.
// Prior success at this claiming level: filter PP history to races at ±20% of today's
// claiming price. A horse that's won here before is proven at the level; one that's
// 0-for-many has shown it can't get past this competition.
function claimLevelWinMult(h, todayClaimPrice) {
  if (!h.pp || !h.pp.length || !todayClaimPrice) return 1.0;
  const lo = todayClaimPrice * 0.8, hi = todayClaimPrice * 1.2;
  let wins = 0, starts = 0;
  for (const p of h.pp) {
    if (!p.cls || !/clm|claim/i.test(p.cls)) continue;
    const m = p.cls.match(/\d+/);
    if (!m) continue;
    const ppPrice = parseInt(m[0]);
    if (ppPrice < lo || ppPrice > hi) continue;
    starts++;
    if (p.finish === 1) wins++;
  }
  if (starts === 0) return 1.0;          // no data at this level — neutral
  if (wins >= 2)    return 1.12;         // consistent winner here
  if (wins >= 1)    return 1.08;         // proven winner at this level
  if (starts >= 5)  return 0.90;         // 0-for-5+ — can't beat this company
  if (starts >= 3)  return 0.94;         // 0-for-3/4 — struggling at level
  return 1.0;                            // 1-2 starts, no win — insufficient data
}

// Recent same-distance/surface bonus (cheap claiming only).
// At cheap tracks, trainers spot horses into the exact same conditions repeatedly.
// A horse that has raced within 60 days at today's distance (±1f) on today's surface
// has a proven edge over horses trying the conditions fresh.
function recentDistSurfMult(h, furlongs, surface, raceDate) {
  if (!h.pp || !h.pp.length || !furlongs || !raceDate) return 1.0;
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const [rY, rM, rD] = [+raceDate.slice(0,4), +raceDate.slice(4,6), +raceDate.slice(6,8)];
  const raceDays = rY*365 + rM*30 + rD;
  let hits = 0;
  for (const p of h.pp) {
    if (!p.date || !p.distYards) continue;
    if (p.surface !== surfCode) continue;
    const pFurl = p.distYards / 220;
    if (Math.abs(pFurl - furlongs) > 1.0) continue;
    const [pY, pM, pD] = [+p.date.slice(0,4), +p.date.slice(4,6), +p.date.slice(6,8)];
    const daysDiff = raceDays - (pY*365 + pM*30 + pD);
    if (daysDiff >= 0 && daysDiff <= 60) hits++;
  }
  if (hits >= 2) return 1.08;
  if (hits >= 1) return 1.05;
  return 1.0;
}

// Sharp fitness bonus (cheap claiming only).
// Horses that have run 2+ times in the last 45 days are sharp and battle-tested.
// At cheap tracks, a horse that's been firing regularly has a big edge over
// horses that have been sitting in the barn.
function dropoutMult(h, p) {
  if (!h.pp || !h.pp.length) return 1.0;
  const last = h.pp[0];
  if (!last || last.bl2nd == null || last.finish == null) return 1.0;
  p = p || getAlgoParams();
  if (last.bl2nd >= 0 && last.bl2nd <= (p.dropoutBl2ndMax ?? 5) && last.finish >= 5
      && h.days_since >= (p.dropoutDaysMin ?? 20) && h.days_since <= (p.dropoutDaysMax ?? 90)
      && h.jockey_roi > 0) return p.dropoutMult ?? 1.30;
  return 1.0;
}



function quitterMult(h) {
  if (!h.pp || !h.pp.length) return 1.0;
  const last = h.pp[0];
  if (!last || last.bl2nd == null || last.blFinish == null) return 1.0;
  // Horse trailed far back at 2nd call AND never improved (came out and quit)
  // Short rest = tried too soon, same problem → penalty
  // Long rest = trainer gave real time off to fix it → value overlay
  const improvement = last.bl2nd - last.blFinish;
  return 1.0;
}

function sharpFitnessMult(h, raceDate) {
  if (!h.pp || !h.pp.length || !raceDate) return 1.0;
  const [rY, rM, rD] = [+raceDate.slice(0,4), +raceDate.slice(4,6), +raceDate.slice(6,8)];
  const raceDays = rY*365 + rM*30 + rD;
  let starts45 = 0, starts25 = 0;
  for (const p of h.pp) {
    if (!p.date) continue;
    const [pY, pM, pD] = [+p.date.slice(0,4), +p.date.slice(4,6), +p.date.slice(6,8)];
    const daysDiff = raceDays - (pY*365 + pM*30 + pD);
    if (daysDiff >= 0 && daysDiff <= 45) starts45++;
    if (daysDiff >= 0 && daysDiff <= 25) starts25++;
  }
  const sf = (getAlgoParams().sharpFitness || {});
  if (starts45 >= 3) return sf.threeStarts45d ?? 0.82;
  if (starts45 >= 2) return sf.twoStarts45d   ?? 0.88;
  if (starts25 === 1) return sf.oneStart25d   ?? 1.60;
  return 1.0;
}

// Returns multiplier: range roughly 0.92–1.08.
// Exception: layoff + class drop is a deliberate trainer setup — neutralize the penalty.
function layoffAdjustment(daysSince, trainerROI, trainerStarts, classMult) {
  if (!daysSince || daysSince <= 60) return 1.0; // routine or first-timer — neutral
  const severity  = daysSince <= 90 ? 0.5 : daysSince <= 180 ? 1.0 : 1.5;
  const trainerQ  = (trainerStarts >= 10 && trainerROI != null) ? trainerROI : 0;
  const raw = (trainerQ - 0.3) * severity;
  // Floor scales with severity: longer layoff with a cold trainer is a bigger risk
  const floor = severity >= 1.5 ? 0.84 : severity >= 1.0 ? 0.88 : 0.92;
  const mult = Math.max(floor, Math.min(1.08, 1.0 + raw * 0.2));
  // Freshened + class drop = trainer spotting horse into a soft spot. Don't penalize.
  if (classMult > 1.05 && mult < 1.0) return 1.0;
  return mult;
}

function getJockeyMultiplier(jockey, surface) {
  const isTurf = surface === 'Turf';
  const turfPref = JOCKEY_TURF_PREFERRED.has(jockey);
  const onPreferred = isTurf ? turfPref : !turfPref;
  if (JOCKEY_TIER1.has(jockey)) return onPreferred ? 1.22 : 1.15;
  if (JOCKEY_TIER2.has(jockey)) return onPreferred ? 1.12 : 1.07;
  return 1.00;
}

function getTrainerMultiplier(trainer, category, surface) {
  const profile = TRAINER_PROFILES[trainer];
  if (!profile) return 1.00;
  if (surface === 'Turf' && profile.turf) return profile.turf;
  if (surface === 'Dirt' && profile.dirt) return profile.dirt;
  return profile[category] || profile.default || 1.05;
}

function getFavoredPostRange(furlongs, surface, fieldSize, trackCode) {
  if (surface === 'Turf') {
    if (furlongs <= 5.5) return [1, 4];
    if (fieldSize >= 12) return [4, 9];
    return [3, 8];
  }
  // Dirt — Churchill Downs has documented rail bias
  if (furlongs <= 6)  return [1, 4];
  if (furlongs <= 7)  return [1, 6];
  return [1, 7];
}

function getPostBonus(post, furlongs, surface, fieldSize, trackCode) {
  const [min, max] = getFavoredPostRange(furlongs, surface, fieldSize, trackCode);
  if (post >= min && post <= max) return 8;
  if (post > max + 3) return -6;
  return 0;
}

// Track-specific post position bias multiplier for cheap tracks.
// Based on known surface/rail tendencies at each venue. Sprints only (<=7f).
function cheapTrackPostMult(post, furlongs, surface, trackCode) {
  if (furlongs > 7 || surface === 'Turf') return 1.0;
  if (trackCode === 'TUP') {
    // Turf Paradise: pronounced rail bias on dirt sprints
    if (post <= 3) return 1.05;
    if (post >= 7) return 0.96;
  }
  if (trackCode === 'MNR') {
    // Mountaineer: outside posts get better ground in sprints
    if (post <= 2) return 0.96;
    if (post >= 5) return 1.04;
  }
  if (trackCode === 'EVD') {
    // Evangeline Downs: slight outside lean in sprints
    if (post <= 2) return 0.97;
    if (post >= 6) return 1.03;
  }
  return 1.0;
}

function getSireBonus(sire, surface) {
  if (surface === 'Turf' && TURF_SIRES.has(sire))  return  8;
  if (surface === 'Dirt' && DIRT_SIRES.has(sire))  return  5;
  if (surface === 'Turf' && DIRT_SIRES.has(sire))  return -5;
  if (surface === 'Dirt' && TURF_SIRES.has(sire))  return -3;
  return 0;
}

function getWeightPenalty(weight, avgWeight, furlongs) {
  const diff = weight - avgWeight;
  if (Math.abs(diff) < 3) return 0;
  return diff * 0.4 * (furlongs <= 7 ? 1.5 : 1.0);
}

// Convert a DRF class string to a comparable numeric value.
// Handles: OC/AOC, Clm, Alw, MdSpWt, Md Clm, graded stakes.
function parseClassValue(cls) {
  if (!cls) return null;
  const s = cls.toUpperCase().replace(/[^A-Z0-9]/g, '');
  // Graded stakes
  if (/G1/.test(s)) return 500000;
  if (/G2/.test(s)) return 300000;
  if (/G3/.test(s)) return 200000;
  // Extract largest number in string
  const nums = [...s.matchAll(/(\d{4,6})/g)].map(m => parseInt(m[1]));
  const amount = nums.length ? Math.max(...nums) : 0;
  // Named/listed stakes (no grade but stakes keyword)
  if (/STK|OAKS|DERBY|CUP|HCP|HANDICAP/.test(s) && !/^MD/.test(s))
    return amount > 0 ? amount : 150000;
  // Optional claiming / AOC — commands premium over straight claiming
  // DRF prepends sex-restriction prefix (f/m/c), so match OC anywhere before digits
  if (/AOC|OCLM|OC\d/.test(s))
    return amount > 0 ? amount * 1.2 : 75000;
  // Allowance — amount is the purse, use it directly (small-track allowances < CLM50K)
  if (/ALW|ALLOW/.test(s)) return amount > 0 ? amount : 75000;
  // Maiden special weight
  if (/MDSPWT|MDSP|MSW/.test(s)) return 55000;
  // Maiden claiming
  if (/^MD/.test(s)) return amount > 0 ? amount * 0.7 : 25000;
  // Straight claiming
  if (/CLM|CLAIM/.test(s)) return amount > 0 ? amount : 30000;
  return amount > 0 ? amount : null;
}

// Compare horse's avg class in last 3 PPs vs today's race class.
// Returns a score multiplier (like jMult/tMult) so class drop scales with base score.
// The drop bonus is conditioned on whether the horse was actually competitive
// at the higher level — a horse getting blown out doesn't deserve full credit.
// surface param: only count competitiveness in races on today's surface so a horse
// competitive on dirt doesn't earn a turf class-drop bonus.
function classDropMultiplier(h, todayClassVal, surface) {
  if (!todayClassVal) return 1.0;
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const ppData = (h.pp || []).slice(0, 5)
    .map(p => ({ classVal: parseClassValue(p.cls), finish: p.finish, blFinish: p.blFinish, surface: p.surface }))
    .filter(d => d.classVal != null);
  if (!ppData.length) return 1.0;

  // Use the MAX class seen in last 5 PPs as the ceiling, not the average.
  // A horse walked down Alw125k → Clm40k → Clm30k → Clm20k has a ceiling of 6.25x,
  // not 3.25x. The avg obscures where the horse actually came from.
  const maxPpClass = Math.max(...ppData.map(d => d.classVal));
  const ratio = maxPpClass / todayClassVal;

  // Base multiplier from class-level ratio.
  // Extreme drops scale beyond 3x: being blown out at 6x your class level is
  // completely different from being blown out at 3x — the horse is slumming.
  const baseMult = ratio >= 6.0 ? 1.45 : ratio >= 5.0 ? 1.38 : ratio >= 4.0 ? 1.32
                 : ratio >= 3.0 ? 1.25 : ratio >= 2.5 ? 1.20 : ratio >= 2.0 ? 1.17
                 : ratio >= 1.5 ? 1.15 : ratio >= 1.25 ? 1.10 : ratio >= 1.1 ? 1.05
                 : ratio >= 0.95 ? 1.00 : ratio >= 0.80 ? 0.96 : 0.92;

  // For class RISES: check if the horse earned it by winning at the lower level.
  // A horse rising after a win is a legitimate trainer move — reduce or eliminate penalty.
  if (ratio < 0.95) {
    const lastRace = ppData[0];  // most recent PP race
    if (lastRace && lastRace.finish === 1) {
      // Won last out — rising after a win. How easily did it win?
      const margin = lastRace.blFinish != null ? Math.abs(lastRace.blFinish) : 0; // winning margin in lengths
      if (margin >= 3) return 1.05;   // dominant win (3+ lengths) — rise is well-earned
      return 1.00;                     // close win — rise is neutral
    }
    // Lost at lower class — keep the penalty
    return baseMult;
  }

  // Only condition the drop bonus when there is an actual meaningful drop
  if (ratio < 1.1) return baseMult;

  // How competitive was the horse in races above today's class level — on today's surface only?
  // Cross-surface competitiveness doesn't transfer.
  const higherRaces = ppData.filter(d => d.classVal > todayClassVal * 1.05 && d.surface === surfCode);
  if (!higherRaces.length) return baseMult;

  const compScore = d => {
    if (d.blFinish != null) {
      if (d.blFinish <=  2) return 1.00;  // right there at the wire
      if (d.blFinish <=  5) return 0.75;  // within striking distance
      if (d.blFinish <= 10) return 0.45;  // mid-pack, not competitive
      return 0.10;                         // blown out
    }
    // Fall back to finish position
    if (d.finish <= 2) return 1.00;
    if (d.finish <= 3) return 0.80;
    if (d.finish <= 5) return 0.50;
    return 0.20;
  };

  const avgComp = higherRaces.map(compScore).reduce((a, b) => a + b, 0) / higherRaces.length;

  // Floor only protects horses that were at least somewhat competitive (avgComp >= 0.4).
  // For extreme drops, even blown-out horses signal overqualification — a horse
  // losing by 15 lengths at 6x the class level is still overqualified at today's level.
  const dropFloor = avgComp >= 0.4
    ? (ratio >= 6.0 ? 1.35 : ratio >= 5.0 ? 1.28 : ratio >= 4.0 ? 1.22 : ratio >= 3.0 ? 1.15 : ratio >= 2.5 ? 1.10 : 0.95)
    : (ratio >= 6.0 ? 1.22 : ratio >= 5.0 ? 1.18 : ratio >= 4.0 ? 1.14 : ratio >= 3.0 ? 1.08 : ratio >= 2.5 ? 1.04 : 0.95);

  const bonus = baseMult - 1.0;
  const raw = Math.max(dropFloor, 1.0 + bonus * Math.max(0, avgComp));

  // Class drop theory assumes the horse is targeting softer ground from strength.
  // A horse on a 90+ day layoff after a blowout is NOT dropping from strength —
  // it's a declining horse looking for easier company. Cap the bonus.
  if (h.days_since > 90 && ppData[0] && ppData[0].finish !== 1 && ppData[0].blFinish > 10) {
    return Math.min(raw, 1.05);
  }
  return raw;
}

// ── PP DATA HELPERS ────────────────────────────────────────────

function ppOnSurface(h, surface) {
  const code = surface === 'Turf' ? 'T' : 'D';
  return (h.pp || []).filter(p => p.surface === code);
}

// Adjust a raw speed figure upward if earned in a harder class, downward if easier.
// Uses log2 scale: each doubling of class level = +4 points. Capped at ±10.
function classAdjustedFig(rawFig, ppClassVal, todayClassVal) {
  if (!rawFig || !ppClassVal || !todayClassVal) return rawFig;
  const ratio = ppClassVal / todayClassVal;
  const adj = Math.log2(ratio) * 4;
  return rawFig + Math.max(-10, Math.min(10, adj));
}

// Return class-adjusted speed figs for a horse on a given surface.
// When todayClassVal is provided, each fig is adjusted by the class it was earned in.
function ppClassAdjFigs(h, surface, todayClassVal) {
  const code = surface === 'Turf' ? 'T' : 'D';
  const onSurf = (h.pp || []).filter(p => p.surface === code && p.speedFig > 0);
  const pool = onSurf.length >= 2 ? onSurf : (h.pp || []).filter(p => p.speedFig > 0);
  const figs = todayClassVal
    ? pool.map(p => classAdjustedFig(p.speedFig, parseClassValue(p.cls), todayClassVal))
    : pool.map(p => p.speedFig);
  // Conditional throwout: only drop the worst fig if it's a genuine outlier —
  // 12+ points below the average of the remaining figs. A horse that consistently
  // runs mediocre figs doesn't get a free pass just because one is the "worst."
  if (figs.length >= 4) {
    const minVal = Math.min(...figs);
    const idx = figs.indexOf(minVal);
    const rest = figs.filter((_, i) => i !== idx);
    const restAvg = rest.reduce((s, f) => s + f, 0) / rest.length;
    if (restAvg - minVal >= 10) return rest;
  }
  return figs;
}

function bestSpeedFig(h, surface, todayClassVal) {
  const figs = ppClassAdjFigs(h, surface, todayClassVal);
  return figs.length ? Math.max(...figs.slice(0, 5)) : null;
}

function avgRecentFig(h, surface, n = 3, todayClassVal) {
  const figs = ppClassAdjFigs(h, surface, todayClassVal).slice(0, n);
  return figs.length ? figs.reduce((s, f) => s + f, 0) / figs.length : null;
}

function figTrend(h, surface, todayClassVal) {
  // Positive = improving (most recent fig higher than 3 back)
  const figs = ppClassAdjFigs(h, surface, todayClassVal);
  if (figs.length < 3) return 0;
  return figs[0] - figs[Math.min(2, figs.length - 1)];
}

// Consistency score: avg class-adjusted fig minus half the standard deviation.
// Rewards horses that run fast AND reliably. A horse posting 84-85-86 beats
// one posting 88-65-82 even though the second has a better peak.
// Uses same surface-preference logic as avgRecentFig.
function figConsistencyScore(h, surface, todayClassVal) {
  const figs = ppClassAdjFigs(h, surface, todayClassVal).slice(0, 5);
  if (!figs.length) return null;
  const avg = figs.reduce((s, f) => s + f, 0) / figs.length;
  const variance = figs.reduce((s, f) => s + (f - avg) ** 2, 0) / figs.length;
  const stdDev = Math.sqrt(variance);
  return avg - stdDev * 0.5;
}

// Sprint = ≤7f, Route = 8f+
function distCat(furlongs) { return furlongs <= 7 ? 'sprint' : 'route'; }

// Closing delta for one past race: how many lengths gained in final fraction
// Positive = closed ground (closer), negative = lost ground (fader)
function closingDelta(p) {
  if (p.bl2nd == null || p.blFinish == null) return null;
  return p.bl2nd - p.blFinish;
}

// Filter past races to same surface AND same distance category
function ppMatchesContext(p, surface, furlongs) {
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  if (p.surface !== surfCode) return false;
  if (p.distYards == null) return false;
  const pFurlongs = p.distYards / 220;
  return distCat(pFurlongs) === distCat(furlongs);
}

// Horse's average closing delta — same surface + distance category, last N qualifying races
function horseClosingScore(h, surface, furlongs, n = 5) {
  const qualifying = (h.pp || []).filter(p => ppMatchesContext(p, surface, furlongs));
  const deltas = qualifying.slice(0, n).map(closingDelta).filter(d => d !== null);
  return deltas.length >= 2 ? deltas.reduce((s, d) => s + d, 0) / deltas.length : null;
}

// Build per-jockey closing profiles keyed by context ('Dirt-sprint', 'Turf-route', etc.)
// Built once per track load; scoreField looks up the right context bucket.
function buildJockeyProfiles() {
  const track = currentTrack();
  if (!track) return {};
  const buckets = {};  // { 'Dirt-sprint': { jockey: [deltas] } }
  for (const race of track.races) {
    for (const h of race.horses) {
      for (const p of (h.pp || [])) {
        if (!p.jockey || p.distYards == null) continue;
        const delta = closingDelta(p);
        if (delta === null) continue;
        const surfLabel = p.surface === 'T' ? 'Turf' : 'Dirt';
        const key = `${surfLabel}-${distCat(p.distYards / 220)}`;
        if (!buckets[key]) buckets[key] = {};
        if (!buckets[key][p.jockey]) buckets[key][p.jockey] = [];
        buckets[key][p.jockey].push(delta);
      }
    }
  }
  // Convert to averages — require 3+ data points
  const profiles = {};
  for (const [key, jockeys] of Object.entries(buckets)) {
    profiles[key] = {};
    for (const [j, deltas] of Object.entries(jockeys)) {
      if (deltas.length >= 3) profiles[key][j] = deltas.reduce((s, d) => s + d, 0) / deltas.length;
    }
  }
  return profiles;
}

function surfaceWinBonus(h, surface) {
  const races = ppOnSurface(h, surface).filter(p => p.finish);
  if (races.length < 2) return 0;
  const wins   = races.filter(p => p.finish === 1).length;
  const places = races.filter(p => p.finish <= 3).length;
  return wins * 12 + (places - wins) * 4;
}

// Chronic non-winner penalty: a horse that consistently fails to win
// despite multiple opportunities. Penalty scales with how chronic the pattern is.
// Only credits wins from the last 8 on-surface starts — a win from years ago
// doesn't mean the horse is still capable of winning.
function winRateMultiplier(h, surface) {
  if (!h.pp || !h.pp.length) return 1.0;
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const onSurf = h.pp.filter(p => p.surface === surfCode && p.finish);
  // No same-surface starts = surface debut — unknown, not a proven loser. Neutral.
  if (onSurf.length === 0) return 1.0;
  // Credit wins within the same window we apply the penalty (last 10 on-surface starts).
  // Using a narrower win-check than penalty window unfairly flags horses with one old win.
  if (onSurf.slice(0, 10).some(p => p.finish === 1)) return 1.0;
  // Has same-surface starts but no wins — apply penalty scaled by sample size
  const recent = onSurf.slice(0, 10);
  if (recent.length < 3) return 1.0;
  const n = recent.length;
  if (n >= 10) return 0.82;
  if (n >= 7)  return 0.86;
  if (n >= 5)  return 0.90;
  return 0.94;
}

// Small sample confidence: fewer speed figs = less certainty about true ability.
// 2 figs is a hint, not a profile. Discount until we have real evidence.
function sampleConfidenceMultiplier(adjFigs) {
  const n = adjFigs.length;
  if (n <= 1) return 0.88;
  if (n <= 2) return 0.93;
  if (n <= 3) return 0.97;
  return 1.00;
}

// Long-shot penalty: the track handicapper is an expert.
// Horses at 13/1+ are being explicitly written off — respect that signal.
// Last-race blowout penalty: a horse beaten 20+ lengths most recently
// is clearly not right. Not a bad day — something is wrong.
// Fade pattern: near the lead at 2nd call but collapsed at finish
// is a specific fitness/stamina failure — penalize harder than a generic wide loss.
function lastRaceBlowoutMultiplier(h, surface) {
  if (!h.pp || !h.pp.length) return 1.0;
  const last = h.pp[0];
  // If last race was on a different surface AND horse had few starts on that surface,
  // the blowout may just reflect being out of element — excuse it.
  // But if horse has 3+ starts on that surface, it's their primary track — blowout is real.
  if (surface && last && last.surface) {
    const surfCode = surface === 'Turf' ? 'T' : 'D';
    if (last.surface !== surfCode) {
      const startsOnBlowoutSurf = h.pp ? h.pp.filter(p => p.surface === last.surface).length : 0;
      if (startsOnBlowoutSurf < 3) return 1.0;  // few starts there — surface explains the result
    }
  }
  // A 2nd or 3rd place is generally competitive regardless of the winner's margin.
  // Exception: 3rd place beaten 20+ lengths is not competitive — likely last in a small field.
  if (!last || last.blFinish == null) return 1.0;
  if (last.finish === 1 || last.finish === 2) return 1.0;
  if (last.finish === 3 && Math.abs(last.blFinish) < 20) return 1.0;
  const bl = Math.abs(last.blFinish);
  // Fade pattern: was on/near the lead at 2nd call (within 1.5L of the leader)
  // then collapsed — stronger signal than getting beaten early and just finishing up.
  // DRF stores all beaten/leading margins as positive numbers, so small bl2nd = near front.
  // 7L threshold in sprints: a 7.25L fade from the lead in a sprint is a real collapse.
if (bl >= 7 && last.bl2nd != null && last.bl2nd <= 1.5) {
    if (bl >= 20) return 0.88;
    return 0.88;
  }
  if (bl <= 10) return 1.00;
  if (bl <= 20) return 0.94;
  if (bl <= 35) return 0.93;
  return 0.88;
}

function longShotMultiplierForClass(morningLine, isMaidenClaiming, classDropMult, surfSwitch) {
  // Class drop negates ML penalty only when horse is NOT switching surfaces.
  // On a surface debut, the ML reflects surface-fitness uncertainty — keep it.
  const surfaceOk = surfSwitch === undefined || surfSwitch >= 1.0;
  if (surfaceOk && classDropMult >= 1.20 && morningLine > 10) return 1.0;  // major drop: neutralize entirely
  if (surfaceOk && classDropMult >= 1.10 && morningLine > 10) {
    // Moderate drop: split halfway between 1.0 and the normal penalty
    const normalPenalty = longShotMultiplierForClass(morningLine, isMaidenClaiming, 1.0, 1.0);
    return (1.0 + normalPenalty) / 2;
  }
  if (isMaidenClaiming) {
    // Softer curve: maiden claiming fields are full of chronic non-winners,
    // so ML spread is wider and a 30/1 still might be ready on the right day.
    if (morningLine <= 12) return 1.00;
    if (morningLine <= 15) return 0.93;
    if (morningLine <= 20) return 0.86;
    if (morningLine <= 30) return 0.77;
    return 0.68;
  }
  if (morningLine <= 10) return 1.00;
  if (morningLine <= 15) return 0.85;
  if (morningLine <= 20) return 0.74;
  if (morningLine <= 30) return 0.63;
  return 0.52;
}

// Workout score: 0–30 additive pts based on recent work quality (last 90 days).
// Percentile = 1 - (rank-1)/(count-1). Weighted toward most recent 3 works.
// Bullets (negative time in DRF) get a 0.15 boost. No-fig horses scale 1.5×.
function workoutScore(h, raceDate, hasPP) {
  if (!h.workouts || !h.workouts.length) return 0;
  const [rY, rM, rD] = [+raceDate.slice(0,4), +raceDate.slice(4,6), +raceDate.slice(6,8)];
  const raceDays = rY*365 + rM*30 + rD;
  const recent = h.workouts.filter(w => {
    const wDays = +w.date.slice(0,4)*365 + +w.date.slice(4,6)*30 + +w.date.slice(6,8);
    return raceDays - wDays <= 90;
  });
  if (!recent.length) return 0;
  const scored = recent.map(w => {
    const pct = w.count > 1 ? 1 - (w.rank - 1) / (w.count - 1) : 1.0;
    return Math.min(1.0, pct + (w.bullet ? 0.15 : 0));
  }).slice(0, 3);
  const w = scored.length >= 3 ? scored[0]*0.5 + scored[1]*0.3 + scored[2]*0.2
          : scored.length === 2 ? scored[0]*0.6 + scored[1]*0.4
          : scored[0];
  return w * 20 * (hasPP ? 1.0 : 1.5);
}

// ── NEW SIGNAL FUNCTIONS ───────────────────────────────────────

// 1. Form cycle: finish position movement between last two same-surface races.
// prev.finish - last.finish: positive = moved forward (8th→2nd = +6 = strong improve).
// Surface-filtered: don't reward dirt form for a turf runner.
function formCycleScore(h, surface) {
  if (!h.pp || h.pp.length < 2) return 0;
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const sameSurf = h.pp.filter(p => p.surface === surfCode && p.finish).slice(0, 2);
  if (sameSurf.length < 2) return 0;
  const [last, prev] = sameSurf;
  return Math.max(-15, Math.min(15, (prev.finish - last.finish) * 2.0));
}

// 2. Late pace consistency: average of last N BRIS late pace figures on today's surface.
// Higher = more late kick. Requires 2+ data points to avoid noise.
// Surface-filtered: a dirt horse's late kick doesn't predict turf form.
function avgLatePaceScore(h, surface, n = 3) {
  if (!h.pp) return null;
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const paces = h.pp.filter(p => p.surface === surfCode).slice(0, n).map(p => p.latePace).filter(v => v !== null && v > 0);
  return paces.length >= 2 ? paces.reduce((s, v) => s + v, 0) / paces.length : null;
}

// 3. Long-term figure trend: recent 2 avg vs. oldest 3 avg (within last 5 figs).
// Captures multi-race improvement arcs better than the short 3-race window.
function figLongTrend(h, surface, todayClassVal) {
  const figs = ppClassAdjFigs(h, surface, todayClassVal);
  if (figs.length < 4) return null;  // null → neutral 62.5, not penalized for small sample
  const recentAvg = (figs[0] + figs[1]) / 2;
  const older = figs.slice(-Math.min(3, figs.length - 2));
  const olderAvg = older.reduce((s, f) => s + f, 0) / older.length;
  return recentAvg - olderAvg;
}

// 4. Declining form: penalize horses that were winning/placing but now run poorly.
// Also flags late pace crashes (< 20 = not trying or physical issue).
function decliningFormMultiplier(h) {
  if (!h.pp || h.pp.length < 3) return 1.0;
  const finishes = h.pp.slice(0, 5).map(p => p.finish).filter(Boolean);
  if (finishes.length < 3) return 1.0;
  const recentAvg = finishes.slice(0, 2).reduce((s, f) => s + f, 0) / Math.min(2, finishes.length);
  const olderBest = Math.min(...finishes.slice(2));
  if (olderBest <= 2 && recentAvg > 6) return 0.91;  // was winning, now losing badly
  const recentPaces = h.pp.slice(0, 3).map(p => p.latePace).filter(v => v !== null && v > 0);
  if (recentPaces.some(v => v < 20)) return 0.90;    // late pace crash = something wrong
  return 1.0;
}

// 5. Chronic maiden penalty: escalating discount for horses with many starts and no win.
// A 5-year-old maiden with 8+ losses is fundamentally different from a 3yo with 2 starts.
// Only applies in maiden races. Age compounds the penalty — older losers get hit harder.
function chronicMaidenDiscount(h, category, actualAge, surface) {
  if (category !== 'msw' && category !== 'maiden_claiming') return 1.0;
  if (!h.pp || h.pp.length === 0) return 1.0;  // debut — skip
  const hasWon = h.pp.some(p => p.finish === 1);
  if (hasWon) return 1.0;  // broke maiden somewhere
  // Surface debut: all starts were on a different surface — unknown on today's surface, not a loser.
  // Use same-surface starts for the penalty scale — a horse with 10 total starts but only
  // 3 on turf is not a "chronic loser" on turf. Needs 4+ same-surface tries to qualify.
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const sameSurfStarts = surface ? h.pp.filter(p => p.surface === surfCode).length : h.pp.length;
  if (sameSurfStarts === 0) return 1.0;
  const starts = sameSurfStarts;
  let base = starts >= 8 ? 0.86
           : starts >= 6 ? 0.90
           : starts >= 4 ? 0.94
           : 1.0;
  if (base === 1.0) return 1.0;
  // Age amplifier: 5yo+ maiden with chronic losses is especially unlikely to break through
  const agePenalty = (actualAge >= 5 && starts >= 4) ? 0.97 : 1.0;
  return base * agePenalty;
}

// 6. Finish position trend: reward dramatic improvement, penalize meaningful decline.
// Captures the "improving maiden" and "bounce-back" patterns that fig trends miss when
// a horse was well back but moved up significantly in its most recent race.
// Guards against bunched finishes: a horse beaten 0.75L in 10th isn't really declining.
function finishPositionTrend(h, surface) {
  if (!h.pp || h.pp.length < 2) return 1.0;
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const sameSurf = h.pp.filter(p => p.surface === surfCode && p.finish != null).slice(0, 2);
  if (sameSurf.length < 2) return 1.0;
  const [cur, prev] = sameSurf;
  const improvement = prev.finish - cur.finish;  // positive = improved

  // Meaningful improvement: was well back (6+), now competitive (top 4), big position jump
  if (prev.finish >= 6 && cur.finish <= 4 && improvement >= 4) {
    const competitive = cur.blFinish == null || cur.blFinish <= 15;
    return competitive ? 1.08 : 1.04;
  }
  // Moderate improvement: was struggling (5+), moved up meaningfully.
  // Guard: don't reward recovering from a catastrophic blowout (25+ lengths) —
  // that's bouncing off an anomaly, not genuine development.
  if (prev.finish >= 5 && improvement >= 3) {
    const prevCatastrophic = prev.blFinish != null && prev.blFinish > 25;
    return prevCatastrophic ? 1.0 : 1.04;
  }

  // Meaningful decline: was competitive (top 3), now well back — skip if bunched finish
  if (prev.finish <= 3 && improvement <= -4) {
    const notBunched = cur.blFinish == null || cur.blFinish >= 5;
    return notBunched ? 0.95 : 1.0;
  }
  // Moderate decline
  if (prev.finish <= 3 && improvement <= -3) {
    const notBunched = cur.blFinish == null || cur.blFinish >= 4;
    return notBunched ? 0.97 : 1.0;
  }
  return 1.0;
}

// 6. Beaten-length compression: horse that significantly closed the gap to the winner
// in its last race vs. the one before — a stronger signal than position alone.
// Boaz example: beaten ~35L (8th) → beaten ~12.5L (2nd) = 22.5L compression → 1.06
function blCompressionMult(h, surface) {
  if (!h.pp || h.pp.length < 2) return 1.0;
  const surfCode = surface === 'Turf' ? 'T' : 'D';
  const sameSurf = h.pp
    .filter(p => p.surface === surfCode && p.blFinish != null && p.finish !== 1)
    .slice(0, 2);
  if (sameSurf.length < 2) return 1.0;
  const [cur, prev] = sameSurf;
  if (prev.blFinish < 8) return 1.0;   // no meaningful prior deficit
  const compression = prev.blFinish - cur.blFinish;
  // Strong: was badly beaten (15L+), now much closer and 15L+ compression
  if (prev.blFinish >= 15 && compression >= 15 && cur.blFinish <= 15) return 1.06;
  // Moderate: 10L+ compression, landing within 10L of winner
  if (compression >= 10 && cur.blFinish <= 10) return 1.04;
  return 1.0;
}

// 6. Pace scenario: in sprints (≤7F) with 2+ early-speed horses, pace duel benefits closers.
// eCount = number of E or E/P run-style horses in the field.
// Small field longshot boost: in fields ≤ 8, the true probability floor is higher than
// the ML implies. A 15/1 horse in a 5-horse field is systematically undervalued.
// Cap combined effect for cheap claiming (already has ML reversion) to avoid double-boost.
function smallFieldLongShotMult() {
  return 1.0; // removed — longshots were getting over-rewarded in small fields
}

function paceScenarioMult(runStyle, eCount, furlongs) {
  if (furlongs >= 7) return 1.0;
  if (eCount < 2) return 1.0;
  const hot = eCount >= 3;
  if (runStyle === 'E')   return hot ? 0.88 : 0.90;
  if (runStyle === 'E/P') return hot ? 0.93 : 0.95;
  if (runStyle === 'S' || runStyle === 'C') return hot ? 1.12 : 1.10;
  return 1.0;
}

// 6. First-time starter ML discount: debut odds are set on workout buzz, not race results.
// Apply a penalty when the ML is tight but there's no race history to support it.
function firstTimerMlDiscount(h) {
  if (h.pp && h.pp.length > 0) return 1.0;
  const ml = h.morning_line;
  if (ml <= 3) return 0.82;
  if (ml <= 5) return 0.88;
  if (ml <= 8) return 0.93;
  return 1.0;
}

// 6. Wet workout bonus: recent works on off-track surfaces signal comfort in the slop.
const OFF_TRACK_CONDS = new Set(['my','wf','sy','sl','gs','sf','hy']);

function wetWorkoutBonus(h) {
  if (!h.workouts || !h.workouts.length) return 0;
  const offCount = h.workouts.slice(0, 4)
    .filter(w => OFF_TRACK_CONDS.has((w.cond || '').toLowerCase())).length;
  return offCount >= 2 ? 8 : offCount === 1 ? 3 : 0;
}

// Track condition multiplier: when today's track is off (muddy/sloppy/soft/etc.),
// reward horses with proven wet-track form and penalize those with no wet history.
// Fast/Good = always 1.0 (no adjustment needed).
function wetTrackMultiplier(h, trackCond) {
  if (!trackCond || !OFF_TRACK_CONDS.has(trackCond)) return 1.0;
  if (!h.pp || !h.pp.length) return 0.94;  // no history at all — unknown

  const wetPPs = h.pp.filter(p => OFF_TRACK_CONDS.has((p.cond || '').toLowerCase()));
  if (wetPPs.length === 0) return 0.93;  // has PP history but never ran wet

  const n      = wetPPs.length;
  const wins   = wetPPs.filter(p => p.finish === 1).length;
  const placed = wetPPs.filter(p => p.finish <= 3).length;
  const placeRate = placed / n;

  if (wins >= 2 || (wins >= 1 && n >= 2 && placeRate >= 0.5)) return 1.12; // proven mudder
  if (wins >= 1) return 1.08;               // at least one wet win
  if (n >= 2 && placeRate >= 0.5) return 1.03; // competitive on wet, no win yet
  return 0.92;  // has run wet but performed poorly
}

// 7. Surface recency: how many of last 4 races were on today's surface?
// A horse switching surfaces with no recent experience on that surface is an unknown.
// 0 recent = full surface switch penalty; 1 recent = limited experience penalty.
function surfaceSwitchMultiplier(h, surface, category) {
  if (!h.pp || !h.pp.length) return 1.0;
  const code = surface === 'Turf' ? 'T' : 'D';
  const recentOnSurf = h.pp.slice(0, 4).filter(p => p.surface === code).length;
  const isMaiden = category === 'msw' || category === 'maiden_claiming';
  // For maiden races, untested surface is unknown (neutral), not a proven negative
  if (recentOnSurf === 0) return isMaiden ? 1.0 : 0.88;
  if (recentOnSurf === 1) return isMaiden ? 0.97 : 0.93;
  return 1.0;
}

// ── BENTER COMBINED MODEL + HARVILLE CORRECTION ────────────────
const HV_GAMMA = 0.81;  // Harville bias correction for 2nd place
const HV_DELTA = 0.65;  // Harville bias correction for 3rd place

// Given an array of win probabilities (summing to ~1), returns
// [{win, place, show}] using Benter's corrected Harville formula.
// Low-probability horses finish 2nd/3rd more often than raw Harville predicts;
// this correction uses power-transformed σ/τ arrays to compensate.
function harvilleProbs(probs) {
  const n = probs.length;
  const sigma = probs.map(p => Math.pow(p, HV_GAMMA));
  const tau   = probs.map(p => Math.pow(p, HV_DELTA));
  const placeP = new Array(n).fill(0);
  const showP  = new Array(n).fill(0);

  for (let j = 0; j < n; j++) {
    let sigSum_j = 0, tauSum_j = 0;
    for (let m = 0; m < n; m++) { if (m !== j) { sigSum_j += sigma[m]; tauSum_j += tau[m]; } }
    if (sigSum_j < 1e-10) continue;

    for (let i = 0; i < n; i++) {
      if (i === j) continue;
      const placeContrib = probs[j] * (sigma[i] / sigSum_j);
      placeP[i] += placeContrib;

      let tauSum_ji = 0;
      for (let m = 0; m < n; m++) { if (m !== j && m !== i) tauSum_ji += tau[m]; }
      if (tauSum_ji < 1e-10) continue;

      const pJthPlaceI = sigma[i] / sigSum_j;
      for (let k = 0; k < n; k++) {
        if (k === j || k === i) continue;
        showP[k] += probs[j] * pJthPlaceI * (tau[k] / tauSum_ji);
      }
    }
  }
  return probs.map((win, i) => ({ win, place: placeP[i], show: showP[i] }));
}

// ── SCORING ────────────────────────────────────────────────────
// Field-relative model: each factor is normalized 0–100 within the race,
// then combined with explicit percentage weights. This prevents ML from
// dominating just because of raw scale differences.

function scoreField(race, trackCode) {
  if (!race || !race.horses.length) return [];
  const category  = getRaceCategory(race);
  const surface   = race.surface;
  const furlongs  = race.distance_furlongs;
  const fieldSize = race.horses.length;
  const avgWeight = race.horses.reduce((s, h) => s + h.weight, 0) / fieldSize;
  const tc        = trackCode || currentTrack()?.trackCode || '';
  const todayClassVal = parseClassValue(race.race_class);
  const isMaidenClaiming = /^Md\s*\d/i.test(race.race_class) && /claim|clm/i.test(race.race_class.replace(/Md\s*/i,''));
  const raceDate = race.dateRaw || '';

  // Count early-speed horses for pace scenario multiplier
  const eCount = race.horses.filter(h => h.run_style === 'E' || h.run_style === 'E/P').length;

  // Cheap claiming flag: claiming price ≤ $10k.
  // At this level, form consistency is noise, figure ceiling matters more, pace is key.
  // Use claiming price from race_class (e.g. "Clm 4000b" → 4000) rather than purse,
  // since purse varies by track but claiming price is the real quality indicator.
  const claimPriceMatch = race.race_class.match(/\d+/);
  const claimPrice = claimPriceMatch ? parseInt(claimPriceMatch[0]) : null;
  // Budget tracks: market-heavy formula applies to ALL race types (MSW/allowance at EVD ≠ CD MSW)
  const CHEAP_TRACKS = new Set(['EVD','TDN','MNR','TUP','LAD','SUN','RUI','CBY','BTP','IND']);
  const isCheapTrack = CHEAP_TRACKS.has(tc);
  const isCheapClaiming = isCheapTrack || (claimPrice !== null && (
    ((category === 'claiming' || category === 'opt_claimer') && claimPrice <= 10000) ||
    (category === 'maiden_claiming' && claimPrice <= 15000)
  ));
  const isStakes = category === 'stakes' || category === 'graded_stakes';

  // Gather raw factor values for every horse
  const raw = race.horses.map(h => {
    const hasPP = h.pp && h.pp.length > 0;
    const adjFigs = ppClassAdjFigs(h, surface, todayClassVal);
    return {
      h, hasPP, adjFigs,
      avgFig:     hasPP ? avgRecentFig(h, surface, 3, todayClassVal) : null,
      bestFig:    hasPP ? bestSpeedFig(h, surface, todayClassVal)    : null,
      trend:      hasPP ? figTrend(h, surface, todayClassVal)        : 0,
      form:       hasPP ? figConsistencyScore(h, surface, todayClassVal) : null,
      surfWins:   hasPP ? surfaceWinBonus(h, surface) : 0,
      horseClose: hasPP ? horseClosingScore(h, surface, furlongs) : null,
      wkScore:    raceDate ? workoutScore(h, raceDate, hasPP) : 0,
      formCycle:  formCycleScore(h, surface),
      latePaceAvg: hasPP ? avgLatePaceScore(h, surface) : null,
      longTrend:  hasPP ? figLongTrend(h, surface, todayClassVal) : null,
      declineMult:   decliningFormMultiplier(h),
      chronicMaiden: chronicMaidenDiscount(h, category, h.actual_age, surface),
      finPosTrend:   finishPositionTrend(h, surface),
      blCompress:    blCompressionMult(h, surface),
      ftiDiscount: firstTimerMlDiscount(h),
      wetWk:      wetWorkoutBonus(h),
      condMult:   wetTrackMultiplier(h, getEffectiveCond(trackCode, race.number)),
      layoffMult: layoffAdjustment(h.days_since, h.trainer_roi, h.trainer_starts, classDropMultiplier(h, todayClassVal, surface)),
      mlProb:     1 / ((h.morning_line || 99) + 1),   // implied probability 0–1
      // Use live ROI when sample is sufficient; fall back to tier lists
      // At cheap claiming tracks, jockey/trainer data is thin/noisy — dampen toward 1.0
      jMult:    (() => { const m = roiMultiplier(h.jockey_roi, h.jockey_starts) ?? getJockeyMultiplier(h.jockey, surface); return isCheapClaiming ? 1 + (m - 1) * 0.4 : m; })(),
      tMult:    (() => { const m = roiMultiplier(h.trainer_roi, h.trainer_starts) ?? getTrainerMultiplier(h.trainer, category, surface); return isCheapClaiming ? Math.min(1.0, 1 + (m - 1) * 0.4) : m; })(),
      tjMult:   tjRoiMultiplier(h.tj_roi, h.tj_starts) ?? ((HOT_COMBOS[h.trainer] || []).includes(h.jockey) ? 1.06 : 1.00),
      postBonus:  getPostBonus(h.post, furlongs, surface, fieldSize, tc),
      sireBonus:  getSireBonus(h.sire, surface),
      weightPen:  getWeightPenalty(h.weight, avgWeight, furlongs),
      classMult:  isCheapClaiming
                    ? Math.min(classDropMultiplier(h, todayClassVal, surface), 1.20)
                    : classDropMultiplier(h, todayClassVal, surface),
      winMult:    winRateMultiplier(h, surface),
      surfSwitch: surfaceSwitchMultiplier(h, surface, category),
      mlMult:     longShotMultiplierForClass(h.morning_line, isMaidenClaiming, classDropMultiplier(h, todayClassVal, surface), surfaceSwitchMultiplier(h, surface, category)),
      blowoutMult:    lastRaceBlowoutMultiplier(h, surface),
      fitnessMult:    isCheapClaiming ? sharpFitnessMult(h, raceDate) : 1.0,
      dropoutMult:    dropoutMult(h),
      quitterMult:    quitterMult(h),
      paceMult:    paceScenarioMult(h.run_style, eCount, furlongs),
      fieldMult:   smallFieldLongShotMult(h.morning_line, race.horses.length, isCheapClaiming),
      sampleMult:  sampleConfidenceMultiplier(adjFigs),
      debutBonus: (!hasPP && h.actual_age <= 3 && TRAINER_PROFILES[h.trainer]) ? 15 : 0,
    };
  });

  // Flag the horse with the highest class-adjusted best fig in the field.
  // This catches horses whose best effort (adjusted for class) outranks the field
  // even when their recent finish positions look unimpressive.
  const maxBestFig = Math.max(...raw.map(d => d.bestFig ?? -Infinity));
  raw.forEach(d => { d._classBestFig = d.bestFig !== null && d.bestFig !== undefined && d.bestFig >= maxBestFig; });

  // Min-max normalize a factor 0–100 within the field, floor at 25.
  // Nulls (no data) land at 62.5 — the midpoint of the 25–100 range —
  // so missing data is neutral: not penalized, not rewarded.
  // Nulls are excluded from the min/max computation so they don't skew the range.
  const norm = (key, floor=25) => {
    const vals = raw.map(d => d[key] !== null && d[key] !== undefined ? d[key] : null);
    const defined = vals.filter(v => v !== null);
    if (!defined.length) return raw.map(() => (floor + 100) / 2);
    const min = Math.min(...defined), max = Math.max(...defined), range = max - min;
    return vals.map(v =>
      v === null ? (floor + 100) / 2
                 : range > 0.001 ? Math.max(floor, ((v - min) / range) * 100) : 50
    );
  };
  const ML_FLOOR = 10; // was 25 — lower floor gives more separation to longshots

  // Combined closing score: horse baseline + jockey adjustment
  // Jockey profile is context-specific: same surface + distance category
  const ctxKey = `${surface}-${distCat(furlongs)}`;
  const jProfiles = State.jockeyProfiles[ctxKey] || {};
  raw.forEach(d => {
    const jAdj = jProfiles[d.h.jockey] ?? null;
    d.closingScore = d.horseClose !== null
      ? d.horseClose + (jAdj !== null ? jAdj * 0.5 : 0)
      : (jAdj !== null ? jAdj * 0.3 : null);  // jockey-only if no horse history
  });

  // Pull weights from active user algo (falls back to defaults if base algo)
  const _ap   = getAlgoParams();
  const _wC   = _ap.cheap  || DEFAULT_ALGO_PARAMS_CLIENT.cheap;   // cheap weights (×100 = percentage)
  const _wS   = _ap.stakes || DEFAULT_ALGO_PARAMS_CLIENT.stakes;  // stakes weights

  const nFig      = norm('avgFig');      // null → 62.5 (neutral mid-field)
  const nBest     = norm('bestFig');
  const nTrend    = norm('trend');
  const nLongTrend= norm('longTrend');
  const nForm     = norm('form');
  const nML       = norm('mlProb', ML_FLOOR);
  const nClose    = norm('closingScore');
  const nLatePace = norm('latePaceAvg');


  const scored = raw.map((d, i) => {
    let score;
    if (d.hasPP) {
      // PP-based weights
      // Cheap claiming (<$10k): form consistency is noise; figure ceiling and pace matter more.
      // Standard: consistency and closing dominate.
      // Weights scaled ×100: params store fractions (0.30), scoring needs integers (30)
      score = isStakes
        ? (nFig[i]       * (_wS.nFig       * 100) +
           nBest[i]      * (_wS.nBest      * 100) +
           nTrend[i]     * (_wS.nTrend     * 100) +
           nLongTrend[i] * (_wS.nLongTrend * 100) +
           nForm[i]      * (_wS.nForm      * 100) +
           nClose[i]     * (_wS.nClose     * 100) +
           nLatePace[i]  * (_wS.nLatePace  * 100) +
           nML[i]        * (_wS.nML        * 100) +
           d.surfWins + d.wkScore)
        : (isCheapClaiming && tc === 'EVD')
        ? (nFig[i]       * 10 +   // EVD: fig sanity check           10%
           nForm[i]      * 10 +   // EVD: form sanity check          10%
           nClose[i]     *  5 +   // EVD: minimal close               5%
           nLatePace[i]  * 10 +   // EVD: minimal late pace          10%
           nML[i]        * 65 +   // EVD: market dominant            65%
           d.surfWins + d.wkScore)
        : isCheapClaiming
        ? (nFig[i]       * (_wC.nFig       * 100) +
           nBest[i]      * (_wC.nBest      * 100) +
           nTrend[i]     * (_wC.nTrend     * 100) +
           nLongTrend[i] * (_wC.nLongTrend * 100) +
           nForm[i]      * (_wC.nForm      * 100) +
           nClose[i]     * (_wC.nClose     * 100) +
           nLatePace[i]  * (_wC.nLatePace  * 100) +
           nML[i]        * (_wC.nML        * 100) +
           d.surfWins + d.wkScore)
        : (nFig[i]       * 18 +   // avg recent speed figure:      18%
           nBest[i]      *  8 +   // best figure last 5:            8%
           nTrend[i]     *  4 +   // short-term trend (2–3 back):   4%
           nLongTrend[i] *  4 +   // multi-race improvement arc:    4%
           nForm[i]      * 26 +   // fig consistency (avg–½σ):     26%
           nClose[i]     * 13 +   // closing ability + jockey:     13%
           nLatePace[i]  * 11 +   // avg BRIS late pace figure:     11%
           nML[i]        *  6 +   // morning line:                  6%
           d.surfWins + d.wkScore);
    } else {
      // No past races: ML + connections + debut angle
      score = nML[i] * 60 + d.debutBonus;
    }

    // Jockey × trainer × hot combo × layoff × win-rate (multiplicative situational edge)
    // sampleMult only applies when there are figs to be uncertain about
    const effectiveSampleMult = d.adjFigs.length === 0 ? 1.0 : d.sampleMult;
    score = score * d.jMult * d.tMult * d.tjMult * d.classMult * d.layoffMult * d.winMult * d.mlMult * d.blowoutMult * effectiveSampleMult * d.declineMult * d.chronicMaiden * d.finPosTrend * d.blCompress * d.ftiDiscount * d.surfSwitch * d.paceMult * d.fieldMult * d.condMult * d.fitnessMult * d.dropoutMult * d.quitterMult;

    // Post position, sire affinity, weight (additive situational)
    // For no-fig horses, workout score added post-mults so it isn't compressed
    const wkBonus = d.hasPP ? 0 : d.wkScore;
    score += d.postBonus + d.sireBonus - d.weightPen + wkBonus + d.formCycle + d.wetWk;

    return {
      ...d.h, score,
      _dbg: {
        avgFig: d.avgFig?.toFixed(1) ?? 'null',  nFig: nFig[i].toFixed(1),
        bestFig: d.bestFig?.toFixed(1) ?? 'null', nBest: nBest[i].toFixed(1),
        trend: d.trend?.toFixed(1) ?? '0',        nTrend: nTrend[i].toFixed(1),
        longTrend: d.longTrend?.toFixed(1) ?? '0', nLongTrend: nLongTrend[i].toFixed(1),
        form: d.form?.toFixed(1) ?? 'null',       nForm: nForm[i].toFixed(1),
        close: d.closingScore?.toFixed(1) ?? 'null', nClose: nClose[i].toFixed(1),
        latePaceAvg: d.latePaceAvg?.toFixed(1) ?? 'null', nLatePace: nLatePace[i].toFixed(1),
        mlProb: d.mlProb.toFixed(3),              nML: nML[i].toFixed(1),
        jMult: d.jMult.toFixed(3), tMult: d.tMult.toFixed(3),
        tjMult: d.tjMult.toFixed(3), classMult: d.classMult.toFixed(3),
        layoffMult: d.layoffMult.toFixed(3),
        declineMult: d.declineMult.toFixed(3), chronicMaiden: d.chronicMaiden.toFixed(3), finPosTrend: d.finPosTrend.toFixed(3), blCompress: d.blCompress.toFixed(3), ftiDiscount: d.ftiDiscount.toFixed(3), paceMult: d.paceMult.toFixed(3),
        surfSwitch: d.surfSwitch.toFixed(3),
        postBonus: d.postBonus, sireBonus: d.sireBonus, weightPen: d.weightPen.toFixed(1),
        formCycle: d.formCycle, wetWk: d.wetWk,
        winMult: d.winMult.toFixed(3), mlMult: d.mlMult.toFixed(3),
        blowoutMult: d.blowoutMult.toFixed(3), sampleMult: d.sampleMult.toFixed(3),
        surfWins: d.surfWins, wkScore: d.wkScore.toFixed(1), condMult: d.condMult.toFixed(3),
        classBestFig: d._classBestFig || false,
      }
    };
  });

  // ── Benter Combined Model (α=β=1.0): geometric mean of fundamental prob × ML prob ──
  // Addresses systematic bias in pure fundamental models: horses the public likes more
  // than the model actually win at higher rates than the model predicts, and vice versa.
  // For maiden races, ML is less reliable (thin public info, limited form) so we dampen
  // its influence using mlPower=0.5 (square root), giving the fundamental model more weight.
  const isMaidenRace = category === 'msw' || category === 'maiden_claiming';
  // Stakes: ML anchor is strongest — sophisticated public, track hcp has private info
  // Maiden: ML is weakest — limited public form knowledge, dampen the anchor
  // Cheap claiming: market knows these horses as well as stakes — public bet-down favorites win 38-39%
  // Cheap claiming: 85-100 nML bucket wins 32.5% — market as strong a signal as stakes
  const mlPower = isMaidenRace ? 0.5 : isStakes ? (_wS.mlPower ?? 1.3) : isCheapClaiming ? (_wC.mlPower ?? 1.3) : 1.0;
  const scoreTotal  = scored.reduce((s, h) => s + Math.max(h.score, 0.01), 0);
  const mlProbTotal = scored.reduce((s, h) => s + 1 / ((h.morning_line || 99) + 1), 0);
  scored.forEach(h => {
    const modelProb = Math.max(h.score, 0.01) / scoreTotal;
    const mlProb    = (1 / ((h.morning_line || 99) + 1)) / mlProbTotal;
    h._combinedRaw  = modelProb * Math.pow(mlProb, mlPower);  // maiden: sqrt dampens ML anchor
  });
  const combinedTotal = scored.reduce((s, h) => s + h._combinedRaw, 0);
  scored.forEach(h => { h._combinedProb = h._combinedRaw / combinedTotal; });

  // ── Harville correction: corrected place and show probabilities ──
  const hvResult = harvilleProbs(scored.map(h => h._combinedProb));
  scored.forEach((h, i) => {
    h._placePct = hvResult[i].place;
    h._showPct  = hvResult[i].show;
    h._dbg.winPct   = (h._combinedProb * 100).toFixed(1);
    h._dbg.placePct = (h._placePct * 100).toFixed(1);
    h._dbg.showPct  = (h._showPct  * 100).toFixed(1);
  });

  // ── Confidence metric: gap between #1 and #3 combined win probability ──
  // A large gap means the model has a clear top horse; a small gap means the
  // top 3 are interchangeable and exotic construction is risky.
  // Sort by combined probability for picks ordering
  scored.sort((a, b) => b.score - a.score);

  // Compute confidence from the combined-prob-sorted order
  if (scored.length >= 3) {
    const gap = (scored[0]._combinedProb - scored[2]._combinedProb) * 100;
    scored._confGap   = gap.toFixed(1);
    scored._confLevel = gap > 15 ? 'HIGH' : gap > 7 ? 'MED' : 'LOW';
  }

  // Assign combined-model rank to each horse for display in scores table
  scored.forEach((h, rank) => { h._combinedRank = rank + 1; });

  // Build the result array, preserving conf properties on the array object
  const result = scored.map((h, rank) => {
    if (rank === 0) console.log(`\n=== RACE RANKINGS (Combined Model) conf=${scored._confLevel} gap=${scored._confGap}pts) ===`);
    const d = h._dbg;
    console.log(
      `#${rank+1} PP${h.post} ${h.name.padEnd(22)} score=${h.score.toFixed(0)} W=${d.winPct}% P=${d.placePct}% S=${d.showPct}%\n` +
      `   Figs: avg=${d.avgFig}(n${d.nFig}) best=${d.bestFig}(n${d.nBest}) trend=${d.trend}(n${d.nTrend}) longTrend=${d.longTrend}(n${d.nLongTrend})\n` +
      `   Form: ${d.form}(n${d.nForm})  Close: ${d.close}(n${d.nClose})  LatePace: ${d.latePaceAvg}(n${d.nLatePace})  ML: ${d.mlProb}(n${d.nML})\n` +
      `   Mults: j=${d.jMult} t=${d.tMult} tj=${d.tjMult} cls=${d.classMult} loff=${d.layoffMult} decline=${d.declineMult} fti=${d.ftiDiscount} surf=${d.surfSwitch}\n` +
      `   Additive: post+${d.postBonus} sire+${d.sireBonus} wt-${d.weightPen} formCycle+${d.formCycle} wetWk+${d.wetWk}`
    );
    return h;
  });
  result._confLevel = scored._confLevel;
  result._confGap   = scored._confGap;
  return result;
}

// ── ANGLE DETECTION ────────────────────────────────────────────

function buildPickAngles(h, race, category) {
  const angles = [];
  const surface = race.surface;

  // Speed figure angles (most important — show first)
  if (h.pp && h.pp.length > 0) {
    const best  = bestSpeedFig(h, surface);
    const avg   = avgRecentFig(h, surface, 3);
    const trend = figTrend(h, surface);

    if (best !== null && best >= 90) angles.push(`top fig ${best}`);
    else if (avg !== null && avg >= 85) angles.push(`avg fig ${Math.round(avg)}`);
    if (trend >= 6) angles.push(`improving (+${Math.round(trend)})`);

    // Recent form
    const finishes = h.pp.slice(0, 3).filter(p => p.finish).map(p => p.finish);
    const wins = finishes.filter(f => f === 1).length;
    if (finishes[0] === 1 && wins >= 1) angles.push('last out winner');
    else if (wins >= 2) angles.push(`${wins} wins last 3`);

    // Surface record
    const onSurf = ppOnSurface(h, surface).filter(p => p.finish);
    if (onSurf.length >= 3) {
      const sw = onSurf.filter(p => p.finish === 1).length;
      if (sw >= 2) angles.push(`${sw}/${onSurf.length} on ${surface.toLowerCase()}`);
    }
  }

  // Connections angles
  if (!angles.length || angles.length < 2) {
    if (JOCKEY_TIER1.has(h.jockey)) {
      const onPref = surface === 'Turf' ? JOCKEY_TURF_PREFERRED.has(h.jockey) : !JOCKEY_TURF_PREFERRED.has(h.jockey);
      angles.push((onPref ? 'preferred surface, ' : '') + h.jockey.split(' ').pop());
    } else if (JOCKEY_TIER2.has(h.jockey)) {
      angles.push(h.jockey.split(' ').pop());
    }
    if (TRAINER_PROFILES[h.trainer]) {
      const turfSpec = ['BROWN CHAD','MOTION H GRAHAM','CASSE MARK','MOTT WILLIAM I'];
      if (surface === 'Turf' && turfSpec.includes(h.trainer))
        angles.push(`turf barn (${h.trainer.split(' ')[0]})`);
      else if (category === 'msw')
        angles.push(`debut trainer ${h.trainer.split(' ')[0]}`);
    }
    if (TURF_SIRES.has(h.sire) && surface === 'Turf') angles.push(`turf sire`);
    if ((HOT_COMBOS[h.trainer] || []).includes(h.jockey)) angles.push(`hot combo`);
  }

  return angles;
}

// ── PICK BUILDER ───────────────────────────────────────────────

function buildPicks(race, trackCode) {
  if (!race || !race.horses.length) return null;
  const category = getRaceCategory(race);
  const tc = trackCode || currentTrack()?.trackCode || '';

  const fr = filteredRace(race);
  if (!fr.horses.length) return null;
  const ranked = scoreField(fr, tc);

  const [h1, h2, h3, h4] = ranked;
  const ml = h => toML(h.morning_line);
  const a1 = buildPickAngles(h1, race, category);
  const a2 = buildPickAngles(h2, race, category);

  const raceLabel = category === 'stakes'   ? `STAKES ($${(race.purse/1000).toFixed(0)}k). `
                  : category === 'msw'      ? 'Maiden special weight. '
                  : category === 'claiming' ? 'Claiming race. '
                  : '';

  // Flag when PP data is driving the pick vs. ML
  const h1hasPP = h1.pp && h1.pp.length > 0;
  const ppNote  = !h1hasPP ? ' (no past races — model uses ML + connections)' : '';

  const analysis =
    `${raceLabel}${h1.name} (${ml(h1)}${a1.length ? ', ' + a1.slice(0,2).join(', ') : ''}) tops the model${ppNote}. ` +
    `${h2.name} (${ml(h2)}${a2.length ? ', ' + a2[0] : ''}) is the logical second. ` +
    `${h3 ? h3.name + ' (' + ml(h3) + ') completes the exotics.' : ''}` +
    `${h4 ? ' ' + h4.name + ' (' + ml(h4) + ') for the Superfecta.' : ''}`;

  const posts = n => ranked.slice(0, n).map(h => h.post);

  return {
    win:        posts(1),
    exacta:     posts(3),
    trifecta:   posts(3),
    superfecta: posts(4),
    pick3_legs: { leg1: posts(3), leg2: posts(3), leg3: posts(3) },
    analysis,
    bestBet:    `Win: ${h1.name}` + (category === 'stakes' ? ` · Key in exotics` : ''),
    confLevel:  ranked._confLevel || 'MED',
    confGap:    ranked._confGap   || '—',
  };
}

// ── STATE ──────────────────────────────────────────────────────
const State = {
  tracks: [],
  activeTrack: 0,
  activeRace: 1,
  activeBet: 'win',
  selections: { win: [], exacta: [], trifecta: [], superfecta: [] },
  pick3: { leg1: [], leg2: [], leg3: [] },
  betSlip: loadSlip(),
  scratches: loadScratches(), // { 'trackCode_dateRaw_raceNum': Set<post> }
  results: {},                // fetched from HRN; keyed by trackCode
  jockeyProfiles: {},
  availableDates: [],   // sorted YYYYMMDD strings of dates that have DRF data
  activeDateIdx: -1,   // index into availableDates; -1 = today (not yet known)
  raceConditions: {}, // trackCode → { raceNum: condString } — sparse; effective cond inherits forward
  allTimeSummary: null, // cached P&L across all dates from /api/results/all
  allTimeDb: null,      // raw db from /api/results/all — used to recompute on bet type change
};

function loadSlip() {
  try { return JSON.parse(localStorage.getItem('trifecta_slip') || '[]'); } catch { return []; }
}
function saveSlip() {
  try { localStorage.setItem('trifecta_slip', JSON.stringify(State.betSlip)); } catch {}
}

// ── SCRATCH PERSISTENCE ────────────────────────────────────────
function loadScratches() {
  try {
    const raw = JSON.parse(localStorage.getItem('trifecta_scratches') || '{}');
    const result = {};
    for (const [k, v] of Object.entries(raw)) result[k] = new Set(v);
    return result;
  } catch { return {}; }
}
function saveScratches() {
  try {
    const s = {};
    for (const [k, v] of Object.entries(State.scratches)) if (v.size) s[k] = [...v];
    localStorage.setItem('trifecta_scratches', JSON.stringify(s));
  } catch {}
}
function scratchKey(raceNum) {
  const t = currentTrack();
  return `${t?.trackCode || 'x'}_${t?.dateRaw || '0'}_${raceNum}`;
}
function isScratched(raceNum, post) {
  return (State.scratches[scratchKey(raceNum)] || new Set()).has(post);
}
function scratchHorse(raceNum, post) {
  const key = scratchKey(raceNum);
  if (!State.scratches[key]) State.scratches[key] = new Set();
  State.scratches[key].add(post);
  // Remove from any active selections on this race
  for (const k of Object.keys(State.selections)) {
    const idx = State.selections[k].indexOf(post);
    if (idx >= 0) State.selections[k].splice(idx, 1);
  }
  for (const legKey of ['leg1','leg2','leg3']) {
    const idx = State.pick3[legKey].indexOf(post);
    if (idx >= 0) State.pick3[legKey].splice(idx, 1);
  }
  saveScratches();
  render();
}
function unscratchHorse(raceNum, post) {
  const key = scratchKey(raceNum);
  if (State.scratches[key]) State.scratches[key].delete(post);
  saveScratches();
  render();
}
function getScratchedNames() {
  const names = new Set();
  const t = currentTrack();
  if (!t) return names;
  for (const race of t.races) {
    const scratched = State.scratches[scratchKey(race.number)];
    if (!scratched || !scratched.size) continue;
    for (const post of scratched) {
      const horse = race.horses.find(h => h.post === post);
      if (horse) names.add(horse.name);
    }
  }
  return names;
}

// ── TRACK / DATA ACCESSORS ─────────────────────────────────────
function currentTrack() { return State.tracks[State.activeTrack]; }
function rKey(t) { return t ? t.trackCode + '_' + t.dateRaw : ''; }
function currentResults() { const t = currentTrack(); return t ? (State.results[rKey(t)] || null) : null; }

function getRace(n) {
  const t = currentTrack();
  return t ? t.races.find(r => r.number === n) : null;
}

function getPicks(raceNum) {
  return buildPicks(getRace(raceNum));
}

// Returns a copy of race with scratched horses removed
function filteredRace(race) {
  if (!race) return race;
  const scratched = State.scratches[scratchKey(race.number)];
  if (!scratched || !scratched.size) return race;
  return { ...race, horses: race.horses.filter(h => !scratched.has(h.post)) };
}

function rankedHorses(race) {
  if (!race) return [];
  return scoreField(filteredRace(race), currentTrack()?.trackCode || '');
}

// ── UTILS ──────────────────────────────────────────────────────
function toML(dec) {
  const map = {1.4:'2/5',1.8:'4/5',2.0:'Even',2.5:'5/2',3.0:'3/1',3.5:'7/2',4.0:'4/1',4.5:'9/2',5.0:'5/1',6.0:'6/1',8.0:'8/1',10.0:'10/1',12.0:'12/1',15.0:'15/1',20.0:'20/1',30.0:'30/1',50.0:'50/1'};
  if (map[dec]) return map[dec];
  if (dec % 1 === 0) return dec + '/1';
  return dec + '/1';
}

function silkColor(silk) {
  if (!silk) return '#555';
  const s = silk.toLowerCase();
  const colors = [
    ['hot pink','#ff69b4'],['royal blue','#2c3e92'],['powder blue','#b0d4e9'],
    ['sky blue','#87ceeb'],['light blue','#add8e6'],['dark blue','#1a237e'],
    ['navy','#1a237e'],['chartreuse','#7fff00'],['turquoise','#1abc9c'],
    ['burgundy','#722f37'],['maroon','#800000'],['emerald','#2ecc71'],
    ['cerise','#de3163'],['salmon','#fa8072'],['slate','#708090'],
    ['magenta','#ff00ff'],['lime','#a8e063'],['gold','#f39c12'],
    ['orange','#e67e22'],['purple','#8e44ad'],['green','#27ae60'],
    ['yellow','#f1c40f'],['red','#e74c3c'],['white','#e8eaf0'],
    ['black','#2a2a2a'],['blue','#2980b9'],['pink','#e91e8c'],
    ['grey','#95a5a6'],['gray','#95a5a6'],['brown','#8b5e3c'],
    ['tan','#d2b48c'],
  ];
  for (const [name, hex] of colors) {
    if (s.startsWith(name)) return hex;
  }
  return '#555';
}

function fmtPurse(n) { return '$' + n.toLocaleString(); }
function fmtDist(f) {
  const map = {4.5:'4½f',5.0:'5f',6.0:'6f',6.5:'6½f',7.0:'7f',8.0:'1 Mile',8.5:'1 1/16m',12.0:'1½ Miles'};
  return map[f] || f + 'f';
}
function fmtClass(c) {
  const map = {'Clm 16000':'Clm $16k','Clm 25000':'Clm $25k','Clm 30000n2l':'Clm $30k','Md Sp Wt':'Mdn Sp Wt','Md 50000':'Mdn Clm $50k','KyJuvnileB250k':'Ky Juvenile Stakes','OClm 80000n2x':'Opt Clm $80k','Alw 50000s':'Allowance','IMphyMthnL200k':'Stakes $200k'};
  return map[c] || c;
}
function horseAge(a) {
  const t = currentTrack();
  const year = t ? parseInt(t.dateRaw.slice(0, 4)) : new Date().getFullYear();
  return year - (2000 + parseInt(a));
}

// ── LOAD RACES FROM SERVER ─────────────────────────────────────
async function loadRaces(dateYMD) {
  showLoading();
  try {
    // Fetch available dates on first load, or on explicit "today" refresh (no dateYMD)
    if (State.availableDates.length === 0 || !dateYMD) {
      try {
        const dr = await fetch('/api/dates');
        State.availableDates = await dr.json();
      } catch {}
    }

    const url = dateYMD ? `/api/races?date=${dateYMD}` : '/api/races';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const data = await res.json();

    // Update active date index
    const loadedDate = data[0]?.dateRaw || dateYMD;
    if (loadedDate && State.availableDates.length > 0) {
      State.activeDateIdx = State.availableDates.indexOf(loadedDate);
    }

    if (!Array.isArray(data) || data.length === 0) {
      showEmpty(dateYMD);
      return;
    }
    State.tracks = data;
    State.activeTrack = 0;
    State.activeRace = data[0].races[0]?.number || 1;
    State.selections = { win: [], exacta: [], trifecta: [], superfecta: [] };
    State.pick3 = { leg1: [], leg2: [], leg3: [] };
    State.activeBet = 'win';
    State.results = {};
    State.showAllDays = false;
    State.allDaysData = null;
    State.allTimeDb = null;
    showApp();
    render();
    fetchAllTrackResults(data);
    fetchAllTimeSummary();
    // Auto-refresh results every 3 minutes for live race tracking
    setInterval(() => {
      const tracks = State.tracks;
      if (tracks && tracks.length) fetchAllTrackResults(tracks);
    }, 3 * 60 * 1000);
  } catch (e) {
    showError(e.message);
  }
}

function navigateDate(dir) {
  const dates = State.availableDates;
  if (!dates.length) return;
  const newIdx = State.activeDateIdx + dir;
  if (newIdx < 0 || newIdx >= dates.length) return;
  State.availableDates = dates; // preserve
  loadRaces(dates[newIdx]);
}

function showError(msg) {

  const dateLabel = dateYMD ? formatDateYMD(dateYMD) : 'today';
  const dates = State.availableDates;

  const datesHtml = otherDates.length
    ? `<div style="margin-top:1.2rem;display:flex;flex-direction:column;gap:0.4rem">
        <div style="font-size:0.75rem;color:var(--text2);margin-bottom:0.2rem">Available dates:</div>
        ${otherDates.map(d => `<button class="add-btn" style="font-size:0.8rem;padding:0.35rem 1rem" onclick="loadRaces('${d}')">${formatDateYMD(d)}</button>`).join('')}
       </div>`
    : '';
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('loading-overlay').innerHTML = `
    <div class="loading-inner">
      <div style="font-size:2.5rem;margin-bottom:1rem">🏇</div>
      <div class="loading-text">No races for ${dateLabel}</div>
      <div class="loading-sub">No .DRF files found matching this date.<br>Drop .DRF files into the <code style="background:var(--bg2);padding:0.1rem 0.4rem;border-radius:4px">data/</code> folder and refresh.</div>

function formatDateYMD(yyyymmdd) {
  if (!yyyymmdd || yyyymmdd.length !== 8) return yyyymmdd;
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+yyyymmdd.slice(4,6)]} ${+yyyymmdd.slice(6,8)}, ${yyyymmdd.slice(0,4)}`;
}

function render() {

function renderTrackTabs() {
  const el = document.getElementById('track-tabs');
  if (State.tracks.length <= 1) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = State.tracks.map((t, i) => {
    const s = computeTrackSummary(t);
    const bs = getBetStats(s);
    let pnlHtml = '';
    if (s && s.totalRaces > 0 && bs && bs.budget > 0) {
      const net = bs.net;
      const roi = bs.roi;
      const color = net >= 0 ? 'var(--green)' : 'var(--red)';
      const roiStr = roi !== null ? (roi >= 0 ? '+' : '') + roi.toFixed(0) + '%' : '';
      pnlHtml = `<span class="track-tab-pnl" style="color:${color}">${net >= 0 ? '+$' : '-$'}${Math.abs(net).toFixed(0)} ${roiStr}</span>`;
    }
    return `<div class="track-tab${i === State.activeTrack ? ' active' : ''}" onclick="selectTrack(${i})">${t.track}${pnlHtml}</div>`;
  }).join('');
}

// Returns the effective track condition for a given race:
// walks backward from raceNum to find the last explicitly-set condition.
function getEffectiveCond(trackCode, raceNum) {
  const map = State.raceConditions[trackCode];
  if (!map) return 'ft';
  // Find highest race number with a set condition that is <= raceNum
  const keys = Object.keys(map).map(Number).filter(n => n <= raceNum).sort((a, b) => b - a);
  return keys.length ? map[keys[0]] : 'ft';
}

// Set condition for raceNum (forward inheritance handled by getEffectiveCond).
function setRaceCond(raceNum, cond) {
  const tc = currentTrack()?.trackCode;
  if (!tc) return;
  if (!State.raceConditions[tc]) State.raceConditions[tc] = {};
  State.raceConditions[tc][raceNum] = cond;
  renderRaceHeader();
  renderBetArea();
}

  const el = document.getElementById('sidebar');

  el.innerHTML = '<div class="sidebar-header">Races</div>' +
    races.map(r => {
      const active = r.number === State.activeRace;
      const chip = r.surface === 'Dirt'
        ? '<span class="surface-chip chip-dirt">Dirt</span>'
        : '<span class="surface-chip chip-turf">Turf</span>';
      const scrCount = (State.scratches[scratchKey(r.number)] || new Set()).size;
      const scrBadge = scrCount > 0 ? `<span class="scr-count-badge">SCR ${scrCount}</span>` : '';

      // Green/red border when results are loaded
      let resultClass = '';
      const rr = currentResults()?.races?.[r.number];
      if (rr?.finishers?.length) {
        const winner = normName(rr.finishers[0].name);
        const top3 = rankedHorses(r).slice().sort((a,b) => b.score - a.score).slice(0,3).map(h => normName(h.name));
        resultClass = top3.includes(winner) ? ' result-hit' : ' result-miss';
      }

      return `<div class="race-item${active ? ' active' : ''}${resultClass}" onclick="selectRace(${r.number})">
        <div class="race-num">Race ${r.number}${chip}${scrBadge}</div>
        <div class="race-meta">${fmtDist(r.distance_furlongs)} · ${fmtClass(r.race_class)}</div>
        <div class="race-meta">${fmtPurse(r.purse)}</div>
      </div>`;
    }).join('');
}

function renderRaceHeader() {
  const r   = getRace(State.activeRace);
  const el  = document.getElementById('race-header');
  const tc  = currentTrack()?.trackCode || '';
  const surfIcon = r.surface === 'Dirt' ? '🟤' : '🟢';

  // Effective condition for this race + whether it's inherited vs explicitly set
  const effCond   = getEffectiveCond(tc, r.number);
  const map       = State.raceConditions[tc] || {};
  const setAt     = Object.keys(map).map(Number).filter(n => n <= r.number).sort((a, b) => b - a)[0];
  const inherited = setAt != null && setAt !== r.number;
  const isOff     = OFF_TRACK_CONDS.has(effCond);

  const COND_LABELS = { ft:'Fast', gd:'Good', my:'Muddy', sy:'Sloppy', sf:'Soft', yl:'Yielding', hy:'Heavy' };
  const condOptions = ['ft','gd','my','sy','sf','yl','hy']
    .map(c => `<option value="${c}"${c === effCond ? ' selected' : ''}>${COND_LABELS[c]}</option>`)
    .join('');
  const inheritNote = inherited ? `<span class="cond-inherited">(set at Race ${setAt})</span>` : '';
  const condColor   = isOff ? 'color:#7ec8a0' : 'color:var(--text3)';

  el.innerHTML = `
    <div class="race-title">Race ${r.number} — ${fmtClass(r.race_class)}</div>
    <div class="race-details">
      <span>${surfIcon} <strong>${r.surface}</strong></span>
      <span>📏 <strong>${fmtDist(r.distance_furlongs)}</strong></span>
      <span>💰 Purse <strong>${fmtPurse(r.purse)}</strong></span>

        ? `<span style="${condColor};font-weight:600">${COND_LABELS[effCond] || effCond}</span>${inheritNote}`
        : `<select class="cond-dropdown${isOff ? ' off-track' : ''}" onchange="setRaceCond(${r.number}, this.value)">${condOptions}</select>${inheritNote}`}
    </div>`;
}

      ${legs.map(lg => {
        const race = getRace(lg.raceNum);
        if (!race) return `<div class="pick3-leg"><div class="pick3-leg-header"><span class="pick3-leg-title">${lg.label}</span></div><div class="pick3-no-race">No race available</div></div>`;
        const sels = State.pick3[lg.key];
        const atMax = sels.length >= 3;
        const rPicks = getPicks(lg.raceNum);
        return `<div class="pick3-leg">
          <div class="pick3-leg-header">
            <span class="pick3-leg-title">${lg.label} — Race ${lg.raceNum}</span>
            <span class="pick3-leg-sub">${fmtDist(race.distance_furlongs)} ${race.surface}</span>
          </div>
          ${(() => {
            const lgFinishers = currentResults()?.races?.[lg.raceNum]?.finishers || [];
            const finishPos = {};
            lgFinishers.slice(0, 4).forEach((f, i) => { finishPos[normName(f.name)] = i; });
            const posCls = ['p3-win','p3-place','p3-show','p3-fourth'];
            return rankedHorses(race).map(h => {
            const sel = sels.includes(h.post);
            const dim = atMax && !sel;
            const legPicks = rPicks?.pick3_legs?.[lg.key] || rPicks?.trifecta || [];
            const pickIdx = legPicks.indexOf(h.post);
            const p3badge = pickIdx === 0 ? '<span class="pick-badge pick-win">★</span>'
                          : pickIdx === 1 ? '<span class="pick-badge pick-contender">◆</span>'
                          : pickIdx === 2 ? '<span class="pick-badge pick-value">◇</span>' : '';
            const fpos = finishPos[normName(h.name)] ?? -1;
            const resCls = fpos >= 0 ? ' ' + posCls[fpos] : '';
            return `<div class="pick3-horse${sel ? ' selected' : ''}${dim ? ' at-max' : ''}${resCls}" onclick="togglePick3('${lg.key}',${h.post})">
              <span class="pick3-pp">${h.post}</span>
              <span class="silk-dot" style="background:${silkColor(h.silks)}"></span>
              <span class="pick3-name">${h.name}${p3badge}${getResultBadge(lg.raceNum, h.name)}</span>
              <span class="pick3-ml">${toML(h.morning_line)}</span>
            </div>`;
          }).join('');
          })()}
          ${(() => {
            const lgScrSet = State.scratches[scratchKey(lg.raceNum)] || new Set();
            return race.horses.filter(h => lgScrSet.has(h.post)).map(h =>
              `<div class="pick3-horse scratched">
                <span class="pick3-pp">${h.post}</span>
                <span class="silk-dot" style="background:${silkColor(h.silks)}"></span>
                <span class="pick3-name">${h.name}</span>
                <span class="scr-badge">SCR</span>
              </div>`
            ).join('');
          })()}
        </div>`;
      }).join('')}
    </div>`;
}
