<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapperAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg0:#0b0f1a;
  --bg1:#111827;
  --bg2:#1a2236;
  --bg3:#1e2d42;
  --bg4:#243350;
  --gold:#c9a227;
  --gold-light:#e6bc34;
  --gold-dim:rgba(201,162,39,0.15);
  --gold-glow:rgba(201,162,39,0.35);
  --text1:#eaf0fb;
  --text2:#8fa3bf;
  --text3:#5a6e85;
  --dirt:#b87333;
  --turf:#3a8a4a;
  --red:#e74c5e;
  --green:#4caf8b;
  --border:rgba(255,255,255,0.07);
  --radius:8px;
  --shadow:0 4px 20px rgba(0,0,0,0.4);
}

body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--text1);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
header{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.12em;line-height:1}
.logo .logo-pick{color:var(--gold)}
.logo .logo-3{color:var(--green)}
.logo .logo-machine{color:var(--green)}
.header-right{display:flex;align-items:center;gap:1.5rem}
.header-track{font-size:0.85rem;color:var(--text2)}
.header-date{font-size:0.85rem;color:var(--gold);font-weight:600}
.date-nav{display:flex;align-items:center;gap:0.5rem}
.date-nav-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:0.75rem;padding:0.2rem 0.55rem;border-radius:4px;cursor:pointer;line-height:1.4;transition:all 0.15s}
.date-nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.date-nav-btn:disabled{opacity:0.25;cursor:default}
.cond-wrap{display:flex;align-items:center;gap:0.4rem}
.cond-label{font-size:0.7rem;color:var(--text2);white-space:nowrap}
.cond-dropdown{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:0.7rem;padding:0.18rem 0.4rem;border-radius:4px;cursor:pointer;outline:none;transition:border-color 0.15s}
.cond-dropdown:hover{border-color:var(--text3)}
.cond-dropdown.off-track{border-color:rgba(74,175,139,0.55);color:#7ec8a0}

/* ── RESULTS OVERVIEW BAR ── */
.results-overview-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:0.3rem 1.25rem;display:flex;align-items:center;gap:0.75rem;flex-shrink:0}
.rob-label{font-size:0.8rem;font-weight:500;letter-spacing:0.1em;color:var(--text2);text-transform:uppercase;white-space:nowrap}
.rob-val{font-size:0.8rem;font-weight:700;white-space:nowrap}
.rob-divider{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 0.25rem}
.rob-recalc-btn{margin-left:auto;font-size:0.62rem;font-weight:700;letter-spacing:0.06em;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:0.15rem 0.5rem;cursor:pointer;white-space:nowrap}
.rob-recalc-btn:hover{color:var(--text1);border-color:var(--text2)}
.rob-recalc-btn:disabled{opacity:0.5;cursor:default}

/* ── TRACK TABS ── */
.track-tabs{display:flex;background:var(--bg0);border-bottom:1px solid var(--border);padding:0 1rem;flex-shrink:0}
.track-tab{padding:0.4rem 1.1rem 0.45rem;font-size:0.78rem;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:0.1rem}
.track-tab:hover{color:var(--text2)}
.track-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.track-tab-pnl{font-size:0.62rem;font-weight:600;line-height:1}

/* ── ALGO SELECTOR ── */
.algo-selector{position:relative;display:inline-flex;align-items:center}
.algo-selector-btn{display:flex;align-items:center;gap:0.4rem;background:var(--bg2);border:1px solid var(--border);color:var(--text1);font-size:0.72rem;font-weight:600;padding:0.2rem 0.55rem;border-radius:4px;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap;max-width:160px}
.algo-selector-btn:hover{border-color:var(--gold);color:var(--gold)}
.algo-selector-btn .algo-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.algo-selector-btn .algo-caret{flex-shrink:0;font-size:0.6rem;color:var(--text3)}
.algo-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-width:220px;box-shadow:var(--shadow);z-index:200;overflow:hidden}
.algo-dropdown-item{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 0.85rem;cursor:pointer;font-size:0.82rem;transition:background 0.1s}
.algo-dropdown-item:hover{background:var(--bg3)}
.algo-dropdown-item.active{color:var(--gold)}
.algo-dropdown-item .algo-dd-check{width:14px;flex-shrink:0;color:var(--gold);font-size:0.75rem}
.algo-dropdown-item .algo-dd-name{flex:1}
.algo-dropdown-item .algo-dd-open{font-size:0.7rem;color:var(--text3);margin-left:auto}
.algo-dropdown-item .algo-dd-open:hover{color:var(--gold)}
.algo-dropdown-divider{height:1px;background:var(--border);margin:0.25rem 0}
.algo-dropdown-new{color:var(--green);font-weight:600}
.algo-dropdown-base{font-style:italic;color:var(--text2)}

/* ── AGENT MODAL ── */
.agent-modal{width:720px;max-width:95vw;height:600px;max-height:85vh}
.agent-layout{display:flex;gap:0;flex:1;overflow:hidden;min-height:0}
.agent-chat{display:flex;flex-direction:column;flex:1;min-width:0;border-right:1px solid var(--border)}
.agent-sidebar{width:200px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.agent-bet-section{padding:0.75rem 0.85rem;border-top:1px solid var(--border);margin-top:auto}
.agent-bet-label{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:0.4rem}
.agent-bet-select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text1);font-size:0.78rem;padding:0.3rem 0.5rem;border-radius:5px;cursor:pointer;outline:none;font-family:inherit}
.agent-bet-select:hover{border-color:var(--gold)}
.agent-sidebar-title{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:0.75rem 0.85rem 0.4rem}
.agent-history-list{flex:1;overflow-y:auto;padding:0 0.5rem 0.5rem}
.agent-history-item{padding:0.4rem 0.5rem;border-radius:5px;cursor:pointer;font-size:0.74rem;color:var(--text2);transition:background 0.1s;border:1px solid transparent}
.agent-history-item:hover{background:var(--bg3)}
.agent-history-item .ah-note{font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-history-item .ah-time{font-size:0.66rem;color:var(--text3);margin-top:0.1rem}
.agent-restore-btn{font-size:0.65rem;color:var(--gold);cursor:pointer;display:none}
.agent-history-item:hover .agent-restore-btn{display:inline}
.agent-messages{flex:1;overflow-y:auto;padding:0.85rem;display:flex;flex-direction:column;gap:0.75rem}
.agent-msg{max-width:88%;padding:0.6rem 0.85rem;border-radius:8px;font-size:0.83rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.agent-msg.user{background:var(--bg3);align-self:flex-end;color:var(--text1)}
.agent-msg.assistant{background:rgba(74,175,139,0.1);border:1px solid rgba(74,175,139,0.2);align-self:flex-start;color:var(--text1)}
.agent-msg.system{background:rgba(201,162,39,0.08);border:1px solid rgba(201,162,39,0.2);align-self:center;font-size:0.75rem;color:var(--text2);font-style:italic}
.agent-input-row{display:flex;gap:0.5rem;padding:0.75rem;border-top:1px solid var(--border);flex-shrink:0}
.agent-input{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text1);font-size:0.85rem;padding:0.55rem 0.75rem;border-radius:6px;outline:none;font-family:inherit;resize:none;line-height:1.4;transition:border-color 0.15s}
.agent-input:focus{border-color:var(--green)}
.agent-send-btn{background:var(--green);color:#000;font-size:0.82rem;font-weight:700;padding:0.55rem 1rem;border:none;border-radius:6px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:opacity 0.15s}
.agent-send-btn:disabled{opacity:0.4;cursor:default}
.agent-pending{background:rgba(201,162,39,0.08);border:1px solid rgba(201,162,39,0.4);border-radius:6px;padding:0.55rem 0.85rem;margin:0.4rem 0;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.agent-pending-label{font-size:0.8rem;color:var(--gold);font-weight:600;flex:1;min-width:0}
.agent-pending-actions{display:flex;gap:0.5rem;flex-shrink:0}
.agent-save-btn{background:var(--green);border:none;color:#fff;font-size:0.75rem;font-weight:700;padding:0.28rem 0.75rem;border-radius:5px;cursor:pointer;letter-spacing:0.04em}
.agent-save-btn:hover:not(:disabled){opacity:0.85}
.agent-save-btn:disabled{opacity:0.35;cursor:default}
.agent-saveas-btn{background:var(--bg3);border:1px solid var(--green);color:var(--green);font-size:0.75rem;font-weight:700;padding:0.28rem 0.75rem;border-radius:5px;cursor:pointer;letter-spacing:0.04em}
.agent-saveas-btn:hover{opacity:0.8}
.agent-cancel-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:0.75rem;padding:0.28rem 0.65rem;border-radius:5px;cursor:pointer}
.agent-cancel-btn:hover:not(:disabled){border-color:var(--red);color:var(--red)}
.agent-cancel-btn:disabled{opacity:0.35;cursor:default}
.agent-footer{border-top:1px solid var(--border);padding:0.5rem 0.85rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;min-height:2.5rem}
.agent-mic-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:1rem;width:36px;height:36px;border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;align-self:flex-end}
.agent-mic-btn:hover{border-color:var(--text2);color:var(--text1)}
.agent-mic-btn.recording{background:rgba(231,76,94,0.15);border-color:var(--red);color:var(--red);animation:mic-pulse 1s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.agent-algo-bar{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.agent-algo-name{font-weight:700;font-size:0.9rem;flex:1;outline:none;background:none;border:none;color:var(--text1);font-family:inherit;cursor:text}
.agent-algo-name:focus{border-bottom:1px solid var(--gold)}
.agent-clear-btn{font-size:0.7rem;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;padding:0.1rem 0.3rem}
.agent-clear-btn:hover{color:var(--red)}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:900;backdrop-filter:blur(2px)}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:12px;width:520px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:1rem;font-weight:700;letter-spacing:0.04em}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.3rem;cursor:pointer;line-height:1;padding:0.1rem 0.3rem;border-radius:4px}
.modal-close:hover{color:var(--text1)}
.modal-body{padding:1.25rem 1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1.25rem}
/* Admin panel specifics */
.admin-section-title{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:0.5rem}
.admin-user-list{display:flex;flex-direction:column;gap:0.4rem}
.admin-user-row{display:flex;align-items:center;gap:0.75rem;padding:0.55rem 0.75rem;background:var(--bg2);border-radius:6px;border:1px solid var(--border)}
.admin-user-name{font-weight:600;font-size:0.88rem;flex:1}
.admin-user-badge{font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.15rem 0.45rem;border-radius:3px;background:rgba(201,162,39,0.15);color:var(--gold);border:1px solid rgba(201,162,39,0.3)}
.admin-user-date{font-size:0.72rem;color:var(--text3)}
.admin-user-actions{display:flex;gap:0.4rem;margin-left:auto}
.admin-btn{font-size:0.72rem;font-weight:600;padding:0.25rem 0.6rem;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:inherit;transition:all 0.15s}
.admin-btn:hover{border-color:var(--text2);color:var(--text1)}
.admin-btn.danger:hover{border-color:var(--red);color:var(--red)}
.admin-divider{height:1px;background:var(--border);margin:0.25rem 0}
.admin-form{display:flex;flex-direction:column;gap:0.75rem}
.admin-form-row{display:flex;gap:0.75rem;align-items:flex-end}
.admin-field{display:flex;flex-direction:column;gap:0.35rem;flex:1}
.admin-field label{font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2)}
.admin-field input{background:var(--bg2);border:1px solid var(--border);color:var(--text1);font-size:0.85rem;padding:0.5rem 0.65rem;border-radius:6px;outline:none;font-family:inherit;transition:border-color 0.15s}
.admin-field input:focus{border-color:var(--gold)}
.admin-toggle{display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--text2);cursor:pointer;white-space:nowrap;padding-bottom:0.5rem}
.admin-toggle input{width:14px;height:14px;cursor:pointer;accent-color:var(--gold)}
.admin-submit{background:var(--gold);color:#000;font-size:0.82rem;font-weight:700;padding:0.55rem 1.2rem;border:none;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background 0.15s}
.admin-submit:hover{background:var(--gold-light)}
.admin-submit:disabled{opacity:0.5;cursor:default}
.admin-msg{font-size:0.78rem;text-align:center;min-height:1rem}
.admin-msg.ok{color:var(--green)}.admin-msg.err{color:var(--red)}
/* Admin button in header */
.admin-header-btn{background:none;border:1px solid var(--border);color:var(--text3);font-size:0.7rem;font-weight:600;letter-spacing:0.06em;padding:0.2rem 0.55rem;border-radius:4px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.admin-header-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── LOGIN SCREEN ── */
.login-screen{position:fixed;inset:0;background:var(--bg0);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:2.5rem 2rem;width:340px;display:flex;flex-direction:column;gap:1.5rem}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:0.12em;text-align:center;line-height:1}
.login-logo .lp{color:var(--gold)}.login-logo .l3{color:var(--green)}.login-logo .lm{color:var(--green)}
.login-title{font-size:0.78rem;color:var(--text3);text-align:center;letter-spacing:0.08em;text-transform:uppercase;margin-top:-0.75rem}
.login-field{display:flex;flex-direction:column;gap:0.4rem}
.login-field label{font-size:0.72rem;font-weight:600;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase}
.login-field input{background:var(--bg2);border:1px solid var(--border);color:var(--text1);font-size:0.9rem;padding:0.6rem 0.75rem;border-radius:6px;outline:none;transition:border-color 0.15s;font-family:inherit}
.login-field input:focus{border-color:var(--gold)}
.login-btn{background:var(--gold);color:#000;font-size:0.85rem;font-weight:700;letter-spacing:0.06em;padding:0.7rem;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s;font-family:inherit}
.login-btn:hover{background:var(--gold-light)}
.login-btn:disabled{opacity:0.5;cursor:default}
.login-error{font-size:0.78rem;color:var(--red);text-align:center;min-height:1rem}
/* User badge in header */
.user-badge{display:flex;align-items:center;gap:0.6rem;font-size:0.78rem;color:var(--text2)}
.user-badge-name{font-weight:600;color:var(--text1)}
.user-badge-logout{background:none;border:1px solid var(--border);color:var(--text3);font-size:0.7rem;padding:0.18rem 0.5rem;border-radius:4px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.user-badge-logout:hover{border-color:var(--red);color:var(--red)}

/* ── LOADING / ERROR ── */
.loading-overlay{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg0)}
.loading-inner{text-align:center;padding:2rem}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1.25rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:1rem;font-weight:600;color:var(--text2);margin-bottom:0.5rem}
.loading-sub{font-size:0.78rem;color:var(--text2);margin-bottom:1.5rem;line-height:1.5}

/* ── LAYOUT ── */
.app-body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar-header{padding:0.75rem 1rem;font-size:0.8rem;font-weight:500;letter-spacing:0.1em;color:var(--text2);text-transform:uppercase;border-bottom:1px solid var(--border)}
.race-item{padding:0.65rem 1rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s;position:relative}
.race-item:hover{background:var(--bg2)}
.race-item.active{background:var(--gold-dim);border-left:3px solid var(--gold)}
.race-item.active .race-num{color:var(--gold)}
.race-item.result-hit{border-left:3px solid var(--green)}
.race-item.result-hit .race-num{color:var(--green)}
.race-item.result-miss{border-left:3px solid var(--red)}
.race-item.result-miss .race-num{color:var(--red)}
.race-num{font-size:0.8rem;font-weight:700;color:var(--text2);margin-bottom:0.2rem}
.race-meta{font-size:0.7rem;color:var(--text2);line-height:1.4}
.surface-chip{display:inline-block;padding:0.05rem 0.35rem;border-radius:3px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-left:0.3rem;vertical-align:middle}
.chip-dirt{background:rgba(184,115,51,0.25);color:var(--dirt)}
.chip-turf{background:rgba(58,138,74,0.25);color:var(--turf)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}
.race-header{padding:1rem 1.5rem 0.75rem;border-bottom:1px solid var(--border);background:var(--bg1);flex-shrink:0}
.race-title{font-size:1rem;font-weight:700;color:var(--text1);margin-bottom:0.25rem}
.race-details{display:flex;gap:1.25rem;font-size:0.75rem;color:var(--text2);align-items:center}
.race-details strong{color:var(--text1)}
.race-cond-row{display:flex;align-items:center;gap:0.5rem;margin-top:0.4rem;font-size:0.72rem;color:var(--text2)}
.race-cond-row .cond-inherited{font-style:italic;font-size:0.68rem;color:var(--text2)}

/* ── BET TABS ── */
.bet-tabs{display:flex;gap:0;padding:0 1.5rem;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.bet-tab{padding:0.65rem 1.1rem;font-size:0.78rem;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;user-select:none}
.bet-tab:hover{color:var(--text2)}
.bet-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.bet-tab.disabled{opacity:0.35;pointer-events:none}

/* ── HORSE TABLE ── */
.bet-area{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.bet-instruction{font-size:0.78rem;color:var(--text2);margin-bottom:0.75rem;padding:0.5rem 0.75rem;background:var(--bg2);border-radius:var(--radius);border-left:3px solid var(--gold)}

.horse-table{width:100%;border-collapse:collapse}

<script>
// ── HANDICAPPING ENGINE — multi-factor, works for any track/date ──

// Client-side mirror of db.js DEFAULT_ALGO_PARAMS
const DEFAULT_ALGO_PARAMS_CLIENT = {
  cheap:  { nML:0.30, nLatePace:0.24, nClose:0.18, nForm:0.08, nFig:0.06, nBest:0.04, nTrend:0.02, nLongTrend:0.02, mlPower:1.3 },
  stakes: { nML:0.16, nBest:0.20, nFig:0.10, nForm:0.14, nClose:0.14, nLatePace:0.10, nTrend:0.02, nLongTrend:0.04, mlPower:1.3 },
  dropoutMult: 1.30, dropoutBl2ndMax: 5, dropoutDaysMin: 20, dropoutDaysMax: 90,
  sharpFitness: { oneStart25d: 1.60, twoStarts45d: 0.88, threeStarts45d: 0.82 },
  roiFloor: 0.95, roiCeiling: 1.20, roiScale: 0.06,
};

function getAlgoParams() {
  return (typeof AlgoState !== 'undefined' && AlgoState.activeAlgo?.params) || DEFAULT_ALGO_PARAMS_CLIENT;
}

const JOCKEY_TIER1 = new Set([
  'ORTIZ IRAD JR','GAFFALIONE TYLER','ORTIZ JOSE L','SAEZ LUIS',
  'PRAT FLAVIEN','VELAZQUEZ J R','ROSARIO JOEL','ALVARADO JUNIOR',
