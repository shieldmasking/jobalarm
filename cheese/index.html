 <script type="text/javascript">

function initialize() {
        navigator.geolocation.getCurrentPosition(
          goJobAlarm,
          noJobAlarm
        );
      }

function goJobAlarm(position) {
	const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    window.location.replace('https://www.jobalarm.biz/m.php?a=126&lat=' + lat + '&lon=' + lon + '&b=7');
  }

function noJobAlarm() {
    window.location.replace("https://www.jobalarm.biz/m.php?a=126&b=7&z=75063");
  }

</script>
