 <script type="text/javascript">

const initialize = () => {
        navigator.geolocation.getCurrentPosition(
          goJobAlarm,
          noJobAlarm
        );
      };

function goJobAlarm(position) {
	const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    window.location.replace('https://www.jobalarm.biz/m.php?a=271&lat=' + lat + '&lon=' + lon + '&b=27');
  }

function noJobAlarm() {
